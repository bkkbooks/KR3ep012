front:
  text: 序聞之醫者意也一病當前先以意為運量後乃經之以法緯之以方內經所謂微妙在意是也醫孰無意而淺深繇是枘鑿繇是徑庭繇是而病機之安危倚伏莫不繇是意之凝釋剖判荒茫顧不危耶大學誠意之功在於格致而其辨尤嚴於欺慊之兩途蓋以殺機每隨於陰幽而生機恆苞於粹白莊周曰天地之道近在胸臆萬一肺腑能語升墜可憐先儒人鬼關之辨精矣昌謂醫事中之欺慊即衆人之人鬼關也奈何世之業醫者輒豔而稱儒儒之誦讀無靈者輒徙而言醫究竟無主之衷二三雜揉醫與儒之門兩無當也求其拔類者長沙一人而已代有哲人然比之仙釋則寥寥易於指數豈非以小道自隘莫溯三氏淵源乎夫人生驅光逐景偶影同遊欣慨交心況於生死安危忍懷僥幸藝藝者物也何以不格昭昭者知也何以不致惟虛惟無萌於太素者意也何以不誠格一物即致一知尚恐逐物求知乃終日勘病不知病為何物而欲望其意之隨舉隨當也不亦難乎昌於此道無他長但自少至老耳目所及之病無不靜氣微心呼吸與會始化我身為病身負影隻立而呻吟愁毒恍忽而來既化我心為病心苟見其生實欲其可而頭骨腦髓捐之不惜儻病多委折治少精詳早已內照他病未痊我身先瘁淵明所謂斯情無假以故不能廣及然求誠一念多於生死輪上寂寂披回不知者謂昌從紙上得之夫活法在人豈紙上所能與耶譬之兵法軍機馬上且不能得況於紙上妄說孫吳但令此心勤密在先冥靈之下神挺自穎邇年先議病後用藥如射者引弓預定中的之高下其後不失亦自可觀何必剜腸滌肺乃稱奇特哉不揣欲遍歷名封大彰其志不謂一身將老世態日紛三年之久不鳴一邑幸值諫議卣臣胡老先生建言歸里一切修舉悉從朝廷起見即昌之一得微長並蒙格外引契參定俚案之近理者命名寓意草捐資付梓其意欲使四方周覽之士大破成局同心愍痛以登斯民於壽域而為聖天子中興燮理之一助云然則小試寓意豈易易能哉崇禎癸未歲季冬月西昌喻昌嘉言甫識

body:
  text: 先議病後用藥從上古以至今時一代有一代之醫雖神聖賢明分量不同然必不能捨規矩準繩以為方圓平直也故治病必先識病識病然後議藥藥者所以勝病者也識病則千百藥中任舉一二種用之且通神不識病則歧多而用眩凡藥皆可傷人況於性最偏駁者乎邇來習醫者衆醫學愈荒遂成一議藥不議病之世界其夭枉不可勝悼或以為殺運使然不知天道豈好殺惡生耶每見仕宦家診畢即令定方以示慎重初不論病從何起藥以何應致庸師以模稜迎合之術妄為擬議逮藥之不效諉於無藥非無藥也可以勝病之藥以不識病情而未敢議用也危哉靈樞素問甲乙難經無方之書全不考究而後來一切有方之書奉為靈寶如朱丹溪一家之言其脈因症治一書先論脈次因次症後乃論治其書即不行而心法一書群方錯雜則共宗之又本草止述藥性之功能人不加嗜及繆氏經疏兼述藥性之過劣則莫不懸之肘後不思草木之性亦取其偏以適人之用其過劣不必言也言之而棄置者衆矣曷不將本草諸藥盡行刪抹獨留無過之藥五七十種而用之乎其於周禮令醫人採毒藥以供醫事之旨及歷代帝王恐本草為未備而博採增益之意不大刺謬乎欲破此惑無如議病精詳病經議明則有是病即有是藥病千變藥亦千變且勿論造化生心之妙即某病之以某藥為良某藥為劫者至是始有定名若不論病則藥之良毒善惡何從定之哉可見藥性所謂良毒善惡與病體所謂良毒善惡不同也而不知者必欲執藥性為去取何其陋耶故昌之議病非得已也昔人登壇指顧後效不爽前言聚米如山先事已饒碩畫醫雖小道何獨不然昌即不能變俗實欲藉此榜樣闡發病機其能用不能用何計焉胡卣臣先生曰先議病後用藥真金匱未抽之論多將熇熇不可救藥是能議病者若藥不瞑眩厥疾不瘳是能用藥者與門人定議病式某年某月某地某人年紀若干形之肥瘦長短若何色之黑白枯潤若何聲之清濁長短若何人之形志苦樂若何病始何日初服何藥次後再服何藥某藥稍效某藥不效時下晝夜孰重寒熱孰多飲食喜惡多寡二便滑澀無有脈之三部九候何候獨異二十四脈中何脈獨見何脈兼見其症或內傷或外感或兼內外或不內外依經斷為何病其標本先後何在汗吐下和寒溫補瀉何施其藥宜用七方中何方十劑中何劑五氣中何氣五味中何味以何湯名為加減和合其效驗定於何時一一詳明務令纖毫不爽起衆信從允為醫門矜式不必演文可也某年者年上之干支治病先明運氣也某月者治病必本四時也某地者辨高卑燥濕五方異宜也某齡某形某聲某氣者用之合脈圖萬全也形志苦樂者驗七情勞逸也始於何日者察久近傳變也歷問病症藥物驗否者以之斟酌己見也晝夜寒熱者辨氣分血分也飲食二便者察腸胃乖和也三部九候何候獨異推十二經脈受病之所也二十四脈見何脈者審陰陽表裡無差忒也依經斷為何病者名正則言順事成如律度也標本先後何在者識輕重次第也汗吐下和寒溫補瀉何施者求一定不差之法也七方大小緩急奇偶復乃藥之制不敢濫也十劑宣通補泄輕重滑澀燥濕乃藥之宜不敢泛也五氣中何氣五味中何味者用藥最上之法寒熱溫涼平合之酸辛甘苦鹹也引湯名為加減者循古不自用也刻效於何時者逐款辨之不差以病之新久五行定痊期也若是則醫案之在人者工拙自定積之數十年治千萬人而不爽也胡卣臣先生曰此如條理始終然智聖之事已備論金道賓真陽上脫之症金道賓之診左尺脈和平右尺脈如控弦如貫索上中甚鋭豫為之駭曰是病枝葉未有害本實先撥必得之醉而使內也曰誠有之但已絶欲三年服人參斤許迄今諸無所苦惟閉目轉盼則身非己有恍若離魂者然不識可治與否豫曰可治再四令疏方未知方中之意歸語門人因請立案豫曰凡人佳冶當前賈勇以明得意又助之以麴櫱五臟翻覆宗筋縱弛百脈動搖以供一時之樂不知難為繼也嘗有未離女軀傾刻告殞者矣是病之有今日者幸也絶欲三年此丈夫之行可收桑榆者但不知能之不為乎抑為之不能乎不為者一陽時生斗柄嘗運不能者相安於無事而已夫人身之陰陽相抱而不脫是以百年有嘗故陽欲上脫陰下吸之不能脫也陰欲下脫陽上吸之不能脫也即病能非一陰陽時有亢戰旋必兩協其平惟大醉大勞亂其常度二氣乘之脫離所爭不必其多即寸中脫出一分此一分便孤而無耦使營魄不能自主治法要在尋其罅漏而緘固之斷鰲立極煉石補天非飾說也若不識病所而博搜以冀弋獲雖日服人參徒竭重資究鮮實益蓋上脫者妄見妄聞有如神靈下脫者不見不聞有如聾瞶上脫者身輕快而汗多淋漓下脫者身重著而肉多青紫昔有新貴人馬上揚揚得意未及回寓一笑而逝者此上脫也又有入寢而遭魘身如被杖九竅出血者此下脫也其有上下一時俱脫者此則暴而又暴不多經見者其有左右相畸而脫者右從下左從上魂升魄降同例也但治分新久藥貴引用新病者陰陽相乖補偏救敝宜用其偏久病者陰陽漸入扶元養正宜用其平若久病誤以重藥投之轉增其竭絶耳引用之法上脫者用七分陽藥三分陰藥而夜服從陰以引其陽下脫者用七分陰藥三分陽藥而晝服從陽以引其陰引之又引陰陽忽不覺其相抱雖登高臨深無所恐發表攻裡無所傷矣經云陰平陽祕精神乃治正謂此也善調者使坎中之真陽上升則周身之氣如冬至一陽初生便葭管飛灰天地翕然從其陽使離中之真陰下降則周身之氣如夏至一陰初生便葽蜩迭應天地翕然從其陰是身中原有大藥豈區區草木所能方其萬一者耶胡卣臣先生曰言脫微矣言治脫更微蓋天地其猶橐籥理固然也金道賓後案金道賓前案次年始見而問治焉今再伸治法夫道賓之病真陽上脫之病也真陽者父母構精時一點真氣結為露水小珠而成胎之本也故胎在母腹先結兩岐即兩腎也腎為水臟而真陽居於其中在易坎中之陽為真陽即此義也真陽既以腎為窟宅而潛伏水中凝然不動默與一身相管攝是以足供百年之用惟夫縱欲無度腎水日竭真陽之面目始露夫陽者親上者也至於露則魄汗淋漓目中有光面如渥丹其飛揚屑越孰從把握之哉所謂神魂飄蕩三年未有寧宇也故每歲至冬而發至春轉劇蓋無以為冬水收藏之本無以為春木發生之基以故腰脊牽強督脈縮而不舒且眩掉動搖有風之象總由自伐其生生之根耳夫生長化收藏之運有一不稱其職便為不治之症今奉藏者少奉生者更少為不治無疑矣而僕斷為可治者以有法治之也且再經寒暑陰陽有漸入之機而驗之人事三年間如處絶域居圍城莫必旦夕之命得於懲創者必深夫是以知其可治也初以煎劑治之劑中兼用三法一者以澀固脫一者以重治怯一者以補理虛緣真陽散越於外如求亡子不得不多方圖之服之果獲大效於是為外迎之法以導之更進而治其本焉治本一法實有鬼神不覷之機未可以言語形容者姑以格物之理明之畜魚千頭者必置介類於池中不則其魚乘雷雨而冉冉騰散蓋魚雖潛物而性樂於動以介類沉重下伏之物而引魚之潛伏不動同氣相求理通玄奧也故治真陽之飛騰屑越不以黿鱉之類引之下伏不能也此義直與奠玄圭而告平成施八索以維地脈同符合撰前案中所謂斷鰲立極早已言之矣然此法不可瀆也瀆則魚亂於下矣其次用半引半收之法又其次用大封大固之法封固之法世雖無傳先賢多有解其旨者觀其命方之名有云三才封髓丸者有云金鎖正元丹者封鎖真陽不使外越意自顯然先得我心之同矣前江鼎翁公祖案中盞中加油則燈愈明爐中覆灰則火不息之說亦早已言之矣誠使真陽復返其宅而凝然與真陰相戀然後清明在躬百年嘗保無患然道賓之病始於溺情今雖小愈倘無以大奪其情勢必為情所壞惟是積精以自剛積氣以自衛積神以自王再加平日之把持庶乎參天之幹非斧斤所能驟傷者若以其時之久而難於忍耐也彼立功異域齧雪虜庭白首始得生還者夫獨非人也歟哉前案中以絶欲三年為丈夫行可收桑榆者亦早已言之矣今以藥石生之更不得不以苦言繼之僕不自度量輒以一葦障狂瀾也其能乎否耶胡卣臣先生曰妙理微機一經抽發真有一彈而三日樂一徽而終日悲者辨袁仲卿小男死證再生奇驗並詳誨門人袁仲卿乃郎入水捉蟛蜞為戲偶僕水中家人救出少頃大熱呻吟諸小兒醫以鎮驚清熱合成丸散與服二日遂至昏迷不醒胸高三寸頸軟頭往側倒氣已垂絶萬無生理再四求余往視診其脈止似蛛絲過指全無以湯二茶匙滴入口中微有吞意謂之曰吾從來不懼外症之重但脈已無根不可救矣一趙姓醫曰鼻如煙煤肺氣已絶縱有神丹不可復活余曰此兒受症何至此極主人及客俱請稍遠待吾一人獨坐靜籌其故良久曰得之矣其父且驚且喜醫者願聞其說余曰驚風一症乃前人鑿空妄談後之小兒受其害者不知幾千百億兆昔與余鄉幼科爭論殊無證據後見方中行先生傷寒條辨後附痙書一冊顓言其事始知昔賢先得我心於道為不孤如此症因驚而得其實跌僕水中感冷濕之氣為外感發熱之病其食物在胃中者因而不化當比夾食傷寒例用五積散治之醫者不明以金石寒冷藥鎮墜外邪深入臟腑神識因而不清其食停胃中者得寒涼而不運所進之藥皆在胃口之上不能透入轉積轉多以致胸高而突宜以理中藥運轉前藥倘得症減脈出然後從傷寒門用藥尚有生理醫者曰鼻如煙煤肺氣已絶而用理中得毋重其絶乎余曰所以獨坐沉思者正為此耳蓋煙煤不過大腸燥結之徵若果肺絶當汗出大喘何得身熱無汗又何得胸高而氣不逼且鼻準有微潤耶此余之所以望其有生也於是煎理中湯一盞與服灌入喉中大啖一口果然從前二日所受之藥一齊俱出胸突頓平頸亦稍硬但脈仍不出人亦不蘇余曰其事已驗即是轉機此為食之未動關竅堵塞之故再灌前藥些少熱已漸退症復遞減乃從傷寒下例以玄明粉一味化水連灌三次以開其大腸之燥結是夜下黑糞甚多次早忽言一聲云我要酒吃此後尚不知人事以生津藥頻灌一日而蘇胡卣臣先生曰驚風一症小兒生死大關孰知其為外感耶習幼科者才虛心領會此案便可免乎殃咎若駭為異說則造孽無極矣門人問曰驚風一證雖不見於古典然相傳幾千百年吾師雖闢其謬頑鈍輩尚不能無疑請明辨之以開聾瞶答曰此問亦不可少吾為子輩大破其惑因以破天下後世之惑蓋小兒初生以及童幼肌肉筋骨臟腑血脈俱未充長陽則有餘陰則不足不比七尺之軀陰陽交盛也惟陰不足陽有餘故身內易至於生熱熱盛則生痰生風生驚亦所恆有設當日直以四字立名曰熱痰風驚則後人不炫因四字不便立名乃節去二字以驚字領頭風字煞尾後人不解遂以為奇特之病也且謂此病有八候以其頭搖手徑也而立抽掣之名以其卒口噤腳攣急也而立目邪心亂搐搦之名以其脊強背反也而立角弓反張之名相傳既久不知其妄造遇見此等證出無不以為奇特而不知小兒之腠理未密易於感冒風寒風寒中人必先中入太陽經太陽之脈起於目內眥上額交巔入腦還出別下項挾脊抵腰中是以病則筋脈牽強因筋脈牽強生出抽掣搐搦角弓反張種種不通名目而用金石藥鎮墜外邪深入臟腑千中千死萬中萬死間有體堅證輕得愈者又詫為再造奇功遂至各守顓門雖日殺數兒不自知其罪矣百年之內千里之遠出一二明哲終不能一一盡剖疑關如方書中有云小兒八歲以前無傷寒此等胡言竟出自高明偏足為驚風之說樹幟曾不思小兒不耐傷寒初傳太陽一經早已身強汗多筋脈牽動人事昏沉勢已極於本經湯藥亂投死亡接踵何繇見其傳經解散耶此所以誤言小兒無傷寒也不知小兒易於外感易於發熱傷寒為獨多世所妄稱為驚風者即是也小兒傷寒要在三日內即愈為貴若待經盡方解必不能耐矣又剛痙無汗柔痙有汗小兒剛痙少柔痙多世醫見其汗出不止神昏不醒往往以慢驚風為名而用參耆朮附等藥閉其腠理熱邪不得外越亦為大害但比金石藥為差減耳所以凡治小兒之熱但當徹其出表不當固其入里也仲景原有桂枝法若舍而不用從事東垣內傷為治毫釐千里最宜詳細又新産婦人去血過多陰虛陽盛其感冒發熱原與小兒無別醫者相傳稱為産後驚風尤堪笑破口頰要知吾闢驚風之說非謂無驚病也小兒氣怯神弱凡遇異形異聲驟然跌僕皆生驚怖其候面青糞青多煩多哭嘗過於分別不比熱邪塞竅神識昏迷對面撞鐘放銃全然不聞者細詳勘驗自識驚風鑿空之謬子輩既遊吾門日引光明勝義洗濯肺腸忽然靈悟頓開便與飲上池無二若但於言下索解則不能盡傳者多矣門人又問曰傷寒原有一表一里之法今謂熱邪當從表出不當令其深入則里藥全在所擯矣豈於古法有未合歟答曰此問亦不可少古法甚明但後人鹵莽不悟耳蓋人身一個殼子包著臟腑在內從殼子上論即骨亦表而從近殼子處論即膀胱尾閭之間亦出表之路也在外以皮毛為表之表在內以大小孔道為里之表總驅熱邪從外出也惟有五臟之間精神魂魄意之所居乃真謂之裡而不可令外邪深入耳如盜至人家近大門則驅從大門出近後門則驅從後門出正不使其深入而得窺寢室耳若盜未至後門必欲驅至及已至後門必欲驅從大門出皆非自全之道也試觀心肺脾肝腎之內並無血脈皮毛肌肉筋骨也而所主者乃在外之血脈皮毛肌肉筋骨則安得以在外者即名為表耶所以傷寒之邪入內有傳腑傳臟之不同而傳腑復有淺深之不同胃之腑外主肌肉而近大門故可施解肌之法內通大小腸而近後門故間有可下之法至膽之腑則深藏肝葉乃寢室之內去前後門俱遠故汗下兩有不宜但從和解而已若傳至三陰則已舍大門而逼近寢室設無他證牽制惟有大開後門極力攻之使從大便出耳今之治傷寒者誤以包臟腑之殼子分表裡故動輒乖錯誠知五臟深藏於殼內而分主在外之血脈皮毛肌肉筋骨也胸中瞭然矣門人又問曰獲聞軀殼包乎五臟奉之為主之誨心地頓開但尚有一疑不識人身之頭奉何臟為主耶答曰頭為一身之元首穹然居上乃主臟而不奉藏者也雖目通肝耳通腎鼻通肺口通脾舌通心不過借之為戶牖不得而主之也其所主之臟則以頭之外殼包藏腦髓腦為髓之海主統一身骨中之精髓以故老人髓減即頭傾視深也內經原有九臟之說五臟加腦髓骨脈膽女子胞神臟五形臟四共合為九豈非腦之自為一臟之主耶吾謂腦之中雖不藏神而腦之上為天門身中萬神集會之所泥丸一宮所謂上八景也惟致虛之極者始能冥漠上通子輩奈何妄問所主耶凡傷寒顯頭痛之證者用輕清藥徹其邪從上出所謂表也用搐鼻藥搐去腦中黃水所謂里也若熱已平復當慮熱邪未盡用下藥時大黃必須酒浸藉酒力以上達所謂鳥巢高巔射而取之之法也今世治大頭瘟一證皆從身之軀殼分表裡不從頭之軀殼分表裡是以死亡莫救誠知腦之自為一臟而顓力以攻之思過半矣附沙宅小兒治驗衛庠沙無翼門人王生之表兄也得子甚遲然縱啖生硬冷物一夕吐食暴僵不醒人事醫以驚風藥治之渾身壯熱面若裝朱眼吊唇掀下利不計其數滿床皆汙至寓長跽請救診畢謂曰此慢脾風候也脾氣素傷更以金石藥重傷今已將絶故顯若干危症本有法可救但須七日方醒恐信不篤而更醫無識反得諉罪生謗王生堅請監督其家且以代勞且以壯膽於是用烏蠍四君子湯每日灌一大劑每劑用人參一錢其家雖暗慌然見面赤退而色轉明潤便瀉止而動移輕活似有欲言不言之意亦自隱忍至第六晚忽覺手足不寧揭去衣被喜吞湯水始極詆人參之害王生先自張皇竟不來寓告明任其轉請他醫才用牛黃少許從前危症復出面上一團死氣但大便不瀉耳重服理脾藥又五日方蘇是役也王生於袁仲卿一案若罔見而平日提命凡治陰病得其轉為陽病則不藥自愈縱不愈用陰分藥一劑或四物二連湯或六味地黃湯以濟其偏則無不愈亦若罔聞姑為鳴鼓之攻以明不屑之誨辨黃長人傷寒疑難危證治驗並詳誨門人黃長人犯房勞病傷寒守不服藥之戒身熱已退十餘日外忽然昏沉渾身戰栗手足如冰舉家忙亂亟請余至一醫已合就薑桂之藥矣余適見而駭之姑俟診畢再三辟其差謬主家自疑陰證言之不入又不可以理服只得與醫者約曰此一病藥入口中出生入死關係重大吾與丈各立擔承倘至用藥差誤責有所歸醫者曰吾治傷寒三十餘年不知甚麼擔承余笑曰吾有明眼在此不忍見人活活就斃吾亦不得已耳如不擔承待吾用藥主家方才心安亟請用藥余以調胃承氣湯約重五錢煎成熱服半盞少頃又熱服半盞其醫見厥漸退人漸蘇知藥不誤辭去仍與前藥服至劑終人事大清忽然渾身壯熱再與大柴胡一劑熱退身安門人問曰病者云是陰證見厥先生確認為陽證而用下藥果應其理安在答曰其理頗微吾從悟入可得言也凡傷寒病初起發熱煎熬津液鼻乾口渴便祕漸至發厥者不問而知為熱也若陽證忽變陰厥者萬中無一從古至今無一也蓋陰厥得之陰證一起便直中陰經唇青面白遍體冷汗便利不渴身蜷多睡醒則人事了了與傷寒傳經之熱邪轉入轉深人事昏惑者萬萬不同諸書類載陰陽二厥為一門即明者猶為所混況昧者乎如此病先犯房室後成傷寒世醫無不為陰厥之名所惑往往投以四逆等湯促其暴亡而諉之陰極莫救致冤鬼夜嗥尚不知悟總由傳派不清耳蓋犯房勞而病感者其勢不過比常較重如發熱則熱之極惡寒則寒之極頭痛則痛之極所以然者以陰虛陽往乘之非陰乘無陽之比況病者始能無藥陰邪必輕旬日漸發尤非暴證安得以厥陰之例為治耶且仲景明言始發熱六日厥反九日後復發熱三日與厥相應則病旦暮愈又云厥五日熱亦五日設六日當復厥不厥者自愈明明以熱之日數定厥之痊期也又云厥多熱少則病進熱多厥少則病退厥愈而熱過久者必便膿血發癰厥應下而反汗之必口傷爛赤先厥後熱利必自止見厥復利利止反汗出咽痛者其喉為痹厥而能食恐為除中厥止思食邪退欲愈凡此之類無非熱深熱厥之旨原未論及於陰厥也至於陽分之病而妄汗妄吐妄下以至勢極如汗多亡陽吐利煩躁四肢逆冷者皆因用藥差誤所致非以四逆真武等湯挽之則陽不能回亦原不為陰證立方也蓋傷寒才一發熱發渴定然陰分先虧以其誤治陽分比陰分更虧不得已從權用辛熱先救其陽與純陰無陽陰盛格陽之證相去天淵後人不窺制方之意見有成法轉相效尤不知治陰證以救陽為主治傷寒以救陰為主傷寒縱有陽虛當治必看其人血肉充盛陰分可受陽藥者方可回陽若面黧舌黑身如枯柴一團邪火內燔者則陰已先盡何陽可回耶故見厥除熱存津液元氣於什一已失之晚況敢助陽劫陰乎證治方云若證未辨陰陽且與四順丸試之直指方云未辨疑似且與理中丸試之亦可見從前未透此關縱有深心無可奈何耳因為子輩詳辨並以告後之業醫者胡卣臣先生曰性靈自啓應是軒岐堂上再來治金鑑傷寒死證奇驗金鑑春月病溫誤治二旬釀成極重死證壯熱不退譫語無倫皮膚枯澀胸膛板結舌卷唇焦身蜷足冷二便略通半渴不渴面上一團黑滯從前諸醫所用之藥大率不過汗下和溫之法絶無一效求救於余余曰此證與兩感傷寒無異但兩感證日傳二經三日傳經已盡即死不死者又三日再傳一周定死矣此春溫證不傳經故雖邪氣留連不退亦必多延幾日待元氣竭絶乃死觀其陰證陽證兩下混在一區治陽則礙陰治陰則礙陽與兩感證之病情符合仲景原謂死證不立治法然曰發表攻裡本自不同又謂活法在人神而明之未嘗教人執定勿藥也吾有一法即以仲景表裡二方為治雖未經試驗吾天機勃勃自動忽生變化若有鬼神相助必可效也於是以麻黃附子細辛湯兩解其在表陰陽之邪果然皮間透汗而熱全清再以附子瀉心湯兩解其在裡陰陽之邪果然胸前柔活人事明瞭諸證俱退次日即思粥以後竟不需藥只此二劑而起一生於九死快哉辨徐國禎傷寒疑難急證治驗徐國禎傷寒六七日身熱目赤索水到前復置不飲異常大躁將門牖洞啓身臥地上展轉不快更求入井一醫洶洶急以承氣與服餘證其脈洪大無倫重按無力謂曰此用人參附子乾薑之證奈何認為下證耶醫曰身熱目赤有餘之邪躁急若此再以人參附子乾薑服之逾垣上屋矣余曰陽欲暴脫外顯假熱內有真寒以姜附投之尚恐不勝回陽之任況敢純陰之藥重劫其陽乎觀其得水不欲咽情已大露豈水尚不欲咽而反可咽大黃芒硝乎天氣燠蒸必有大雨此證頃刻一身大汗不可救矣且既認大熱為陽證則下之必成結胸更可慮也惟用姜附可謂補中有發並可以散邪退熱一舉兩得至穩至當之法何可致疑吾在此久坐如有差誤吾任其咎於是以附子乾薑各五錢人參三錢甘草二錢煎成冷服服後寒戰戛齒有聲以重綿和頭覆之縮手不肯與診陽微之狀始著再與前藥一劑微汗熱退而安胡卣臣先生曰先生雄辨可以當仁治錢仲昭傷寒發癍危證奇驗錢仲昭患時氣外感三五日發熱頭痛服表汗藥疼止熱不清口乾唇裂因而下之遍身紅癍神昏譫語食飲不入大便復祕小便熱赤脈見緊小而急謂曰此證全因誤治陽明胃經表裡不清邪熱在內如火燎原津液盡干以故神昏譫語若癍轉紫黑即刻死矣目今本是難救但其面色不枯聲音尚朗乃平日保養腎水有餘如旱田之側有下泉未竭故神雖昏亂而小水仍通乃陰氣未絶之徵尚可治之不用表裡單單隻一和法取七方中小方而氣味甘寒者用之惟如神白虎湯一方足以療此蓋中州元氣已離大劑急劑復劑俱不敢用而虛熱內熾必甘寒氣味方可和之耳但方須宜小而服藥則宜頻如飢人本欲得食不得不漸漸與之必一晝夜頻進五七劑為浸灌之法庶幾邪熱以漸而解元氣以漸而生也若小其劑復曠其日縱用藥得當亦無及矣如法治之更一晝夜而病者熱退神清脈和食進其癍自化胡卣臣先生曰病與藥所以然之地森森警發治傷寒壞證兩腰僂廢奇驗張令施乃弟傷寒壞證兩腰僂廢臥床徹夜痛叫百治不效求診於余其脈亦平順無患其痛則比前大減余曰病非死證但恐成廢人矣此證之可以轉移處全在痛如刀刺尚有邪正互爭之象若全然不痛則邪正混為一家相安於無事矣今痛覺大減實有可慮宜速治之病者曰此身既廢命安從活不如速死余蹙額欲為救全而無治法諦思良久謂熱邪深入兩腰血脈久閉不能復出只有攻散一法而邪入既久正氣全虛攻之必不應乃以桃仁承氣湯多加肉桂附子二大劑與服服後即能強起再仿前意為丸服至旬余全安此非昔人之已試乃一時之權宜也然有自來矣仲景於結胸證有附子瀉心湯一法原是附子與大黃同用但在上之證氣多故以此法瀉心然則在下之證血多獨不可仿其意而合桃仁肉桂以散腰間之血結乎後江古生乃弟傷寒兩腰僂廢痛楚不勞思索徑用此法二劑而愈胡卣臣先生曰金針雖度要解鑄古熔今始能下手辨黃起潛曙修時氣傷寒治各不同黃曙修與乃翁起潛春月同時病溫乃翁年老而勢輕曙修年富而勢重勢重者以冬不藏精體虛不任病耳余見其頭重著枕身重著席不能轉側氣止一絲不能言語畏聞聲響於表汗藥中用人參七分伊表侄施濟卿恐其家婦女得知不與進藥暗贈人參入藥服後汗出勢減次日再於和解藥中贈人參一錢與服服後即大便一次曙修頗覺輕爽然疑藥下之早也遣人致問余告以此證表已解矣里已和矣今後緩調即日向安不必再慮往診見老翁病尚未愈頭面甚紅謂曰望八老翁下元虛憊陽浮於上與在表之邪相合所謂戴陽之證也陽已戴於頭面不知者更行表散則孤陽飛越而危殆立至矣此證從古至今只有陶節庵立法甚妙以人參附子等藥收拾陽氣歸於下元而加蔥白透表以散外邪如法用之即愈萬不宜遲渠家父子俱病無人敢主且駭為偏僻之說旋即更醫投以表藥頃刻陽氣升騰肌膚粟起又頃刻寒顫咬牙渾身凍裂而逝翁雖海濱一氓留心管晏富國之略而齎志以沒也良足悼矣其醫於曙修調理藥仍行克伐致元氣日削謝絶醫藥靜養六十餘日方起於床愈後凡遇戚友家見余用藥率多詆訾設知當日解表和中俱用人參肯捨命從我乎是其所以得全者藉於濟卿之權巧矣附傷寒戴陽證石開曉病傷風咳嗽未嘗發熱日覺急迫欲死呼吸不能相續求余診之余見其頭面赤紅躁擾不歇脈亦豁大而空謂曰此證頗奇全似傷寒戴陽證何以傷風小恙亦有之急宜用人參附子等藥溫補下元收回陽氣不然子丑時一身大汗脫陽而死矣渠不以為然及日落陽不用事愈慌亂不能少支忙服前藥服後稍寧片刻又為床側添同寢一人逼出其汗如雨再用一劑汗止身安咳嗽俱不作詢其所繇云連服麻黃藥四劑遂爾躁急欲死然後知傷風亦有戴陽證與傷寒無別總因其人平素下虛是以真陽易於上越耳胡卣臣先生曰戴陽一證剖析精詳有功來學辨王玉原傷寒後餘熱並永定善後要法王玉原昔年感證治之不善一身津液盡為邪熱所爍究竟十年餘熱未盡去右耳之竅嘗閉今夏復病感纏綿五十多日面足浮腫臥寐不寧耳間氣往外觸蓋新熱與舊熱相合狼狽為患是以難於去體醫者不察其綢繆膠結之情治之茫不中窾延至秋深金寒水冷病方自退然淺者可退深者莫由遽退也面足浮腫者肺金之氣為熱所壅失其清肅下行之權也臥寐不寧者胃中之津液乾枯不能內榮其魂魄也耳間大氣撞出者久閉之竅氣來不覺今病體虛羸中無阻隔氣逆上衝始知之也外病雖愈而飲食藥餌之內調者尚居其半特挈二事大意為凡病感者明善後之法焉蓋人當感後身中之元氣已虛身中之邪熱未淨於此而補虛則熱不可除於此而清熱則虛不能任即一半補虛一半清熱終屬模糊不得要領然舍補虛清熱外更無別法當細辨之補虛有二法一補脾一補胃如瘧痢後脾氣衰弱飲食不能運化宜補其脾如傷寒後胃中津液久耗新者未生宜補其胃二者有霄壤之殊也清熱亦有二法初病時之熱為實熱宜用苦寒藥清之大病後之熱為虛熱宜用甘寒藥清之二者亦霄壤之殊也人身天真之氣全在胃口津液不足即是虛生津液即是補虛故以生津之藥合甘寒瀉熱之藥而治感後之虛熱如麥門冬生地黃牡丹皮人參梨汁竹瀝之屬皆為治法仲景每用天水散以清虛熱正取滑石甘草一甘一寒之義也設誤投參耆苓朮補脾之藥為補寧不並邪熱而補之乎至於飲食之補但取其氣不取其味如五穀之氣以養之五菜之氣以充之每食之間便覺津津汗透將身中蘊蓄之邪熱以漸運出於毛孔何其快哉人皆不知此理急於用肥甘之味以補之目下雖精采健旺可喜不思油膩阻滯經絡邪熱不能外出久久充養完固愈無出期矣前哲有鑑於此寧食淡茹蔬使體暫虛而邪易出乃為貴耳前藥中以浮腫屬脾用苓朮為治以不寐責心用棗仁茯神為治總以補虛清熱之旨未明故詳及之胡卣臣先生曰傷寒後飲食藥餌二法足開聾瞶答門人問蔣中尊受病致死之因門人問曰崇明蔣中尊病傷寒臨危求肉汁淘飯半碗食畢大叫一聲而逝此何故也答曰今人外感病兼內傷者多用藥全要分別如七分外感三分內傷則治外感藥中宜用緩劑小劑及薑棗和中為引庶無大動正氣汗血等纍若七分內傷三分外感則用藥全以內傷為主但加入透表藥一味而熱服以助藥勢則外感自散蓋以內傷之人才有些微外感即時發病不似壯盛之人必所感深重其病乃發也蔣中尊者向曾見其滿面油光已知其精神外用非永壽之人也人惟欿然不足方有餘地可以應世可以當病若夫神采外揚中之所存寧復有幾耶近聞其宦情與聲色交濃宵征海面冒蜃煙蛟霧之氛尚犯比頑之戒則其病純是內傷而外感不過受霧露之氣耳霧露之邪其中人也但入氣分清道原不傳經故非發表攻裡所能驅惟培元氣厚穀氣則邪不驅而自出設以其頭暈發熱認為太陽之證誤表其汗則內傷必轉增而危殆在所必致矣且內傷之人一飽一飢早已生患又誤以為傷寒而絶其食已虛益虛致腹中餒憊求救於食食入大叫一聲者腸斷而死也此理甚明如饑民仆地即死氣從中斷不相續也又如膈病展轉不能得食臨危每多大叫而逝以無外感之邪亂其神明是以炯炯自知其絶也果有外邪與正交爭其人未死前先已昏惑不省矣安得精明若是哉子於望聞問切之先早清其鑑可矣門人又問曰每見人之神采外揚者病發恆多汗而躁急不識何藥可以治之答曰上藥在以神治神蓋神既外揚必須內守方可逆挽老子所謂知其雄守其雌知其白守其黑真對證之藥也若夫草木之性則取其氣下達而味沉厚者用之恆使勿缺仿灌園之例頻頻預沃之以水而防其枯竭可也門人又問曰臨危索飯之時尚有藥可救否曰獨參湯可以救之吾嘗治一孕婦傷寒表汗過後忽喚婢作伸冤之聲知其擾動陽氣急迫無奈令進參湯不可捷得遂以白朮三兩熬濃汁一碗與服即時安妥況人參之力百倍白朮耶論內傷轉瘧宜防虛脫並治驗袁繼明素有房勞內傷偶因小感自煎薑蔥湯表汗因而發熱三日變成瘧疾余診其脈豁大空虛且寒不成寒熱不成熱氣急神揚知為元陽衰脫之候因謂其父曰令郎光景竊慮來日瘧至大汗不止難於救藥倘信吾言今晚急用人參二兩煎濃汁頻服防危渠父不以為意次日五鼓時病者精神便覺恍惚扣門請救及覓參至瘧已先發矣余甚倣徨恐以人參補住瘧邪雖救急無益也只得姑俟瘧勢稍退方與服之服時已汗出沾濡頃之果然大汗不止昏不知人口流白沫灌藥難入直至日暮白沫轉從大孔遺出余喜曰沫下行可無恐矣但內虛腸滑獨參不能勝任急以附子理中湯連進四小劑人事方蘇能言但對面談事不清門外有探病客至渠忽先知家人驚以為祟余曰此正神魂之離舍耳吾以獨參及附子理中駟馬之力追之尚在半返未返之界以故能知宅外之事再與前藥二劑而安胡卣臣先生曰病情上看得委息周至大開生面推原陸中尊瘧患病機及善後法陸六息先生體偉神健氣旺血充從來無病蒞任以後適值奇荒巨寇憂勞百倍因而病瘧食飲減少肌肉消瘦形體困倦口中時時噯氣其候一日輕一日重纏綿三月大為所苦察脈辨證因知先生之瘧乃飢飽勞佚所感受傷在陽明胃之一經夫陽經受病邪氣淺而易愈乃至為所苦者緣不識病之所在藥與病邪不相值反傷其正耳誠知病邪專專在胃則胃為水穀之海多氣多血之區一調其胃而瘧立止矣故飲食減而大便轉覺艱澀者胃病而運化之機遲也肌肉消瘦者胃主肌肉也形體困倦者胃病而約束之機關不利也口中時時噯氣者胃中不和而顯晦塞之象也至於一日輕而一日重者此人所不經見之證病機之最當發明者其候亦陽明胃經之候也內經陽明脈解篇有曰陽明之病惡人與火聞木聲則惕然而驚及刺瘧篇又曰陽明之證喜見火喜見日月光何經文之自為悖謬耶不知此正更實更虛之妙義而與日輕日重之理相通者也夫陽明得病之始則邪氣有餘故惡人惡火惡木音者惡其劫邪也及其病久則邪去而正亦虛故喜火喜日月光者喜其助正也若是則時日乾支之衰旺其與人身相關之故可類推矣蓋甲丙戊庚壬者天時之陽也乙丁己辛癸者天時之陰也瘧久食減胃中之正已虛而邪去未盡是以值陽日助正而邪不能勝則輕值陰日助邪而正不能勝則重也夫人身之病至於與天時相召亦云亟矣使當日稍知分經用藥何至延綿若是哉迄今吃緊之處全以培養中氣為主蓋人雖一胃而有三脘之分上脘象天清氣居多下脘象地濁氣居多而其能升清降濁者全賴中脘為之運用一如天地定位不可無人焉參贊之也先生下脘之濁氣本當下傳也而傳入腸中則艱不當上升也而升至胸中甚易者無他中脘素受飲食之傷不能阻下脘濁氣上干清道耳試觀天地間有時地氣上而為云必得天氣下而為雨則二氣和而晴爽立至若一味地氣上升天氣不降則太空窒塞而成陰噎之象人之胃中亦猶是也清濁偶有相干頃當自定設有升無降則逼矣故中脘之氣旺則水穀之清氣上升於肺而灌輸百脈水穀之濁氣下達於大小腸從便溺而消胸中何窒塞之有哉此所以培養中氣為亟亟也中氣旺則濁氣不久停於下脘而臍下丹田之真氣方能上下無礙可以呼之於根吸之於蒂深深其息矣所用六味地黃丸凝滯不行之藥大為胃病所不宜況於濁氣上干反以陰濁之屬揚波助流尤無所取今訂理中湯一方升清降濁為合法耳胡卣臣先生曰說病機處花雨繽紛令觀者得未曾有力爭截瘧成脹臨危救安奇驗劉泰來年三十二歲體豐面白夏月慣用冷水灌汗坐臥巷曲當風新秋病瘧三五發後用藥截住遂覺胸腹間脹滿日增不旬日外腹大胸高上氣喘急二便全無飲食不入能坐不能臥能俯不能仰勢頗危急雖延余至家其專主者在他醫也其醫以二便不通服下藥不應商用大黃二兩作一劑病者曰不如此不能救急可速煎之余駭曰此名何病也而敢放膽殺人耶醫曰傷寒腸結下而不通惟有大下一法何謂放膽余曰世間有不發熱之傷寒乎傷寒病因發熱故津液枯槁腸胃乾結而可用下藥以開其結然有不轉失氣者不可攻之戒正恐誤治太陰經之腹脹也此病因腹中之氣散亂不收故津水隨氣橫決四溢而作脹全是太陰脾氣不能統攝所致一散一結相去天淵再用大黃猛劑大散其氣若不脹死定須腹破曷不留此一命必欲殺之為快耶醫唯唯曰吾見不到姑已之出語家人曰吾去矣此人書多口溜不能與爭也病家以余逐其醫而含怒私謂醫雖去藥則存且服其藥請來未遲才取藥進房余從後追至擲之溝中病者殊錯愕而婉其辭曰此藥果不當服亦未可知但再有何法可以救我其二弟之不平則徵色而且發聲矣余即以一柬面辨數十條而定理中湯一方於後病者見之曰議論反覆精透但參朮助脹安敢輕用大黃藥已吃過二劑尚未見行不若今日且不服藥挨至明日再看光景亦無可奈何之辭也余曰何待明日腹中真氣漸散今晚子醜二時陰陽交剝之界必大汗暈眩難為力矣病者曰銼好一劑俟半夜果有此證即刻服下何如不識此時尚可及否余曰既畏吾藥如虎煎好備急亦通余就客寢坐待室中呼召絶無動靜次早其子出雲昨晚果然出汗發暈忙服尊劑亦不見效但略睡片時仍舊作脹進診病者曰服藥後喜疾勢不增略覺減可且再服一劑未必大害余遂以三劑藥料作一劑加人參至三錢服過又進一大劑少加黃連在內病者扶身出廳云內脹大減即不用大黃亦可耐但連日未得食必用大黃些些略通大便吾即放心進食矣余曰如此爭辨還認作傷寒病不肯進食其實吃飯吃肉亦無不可於是以老米煮清湯飲之不敢吞粒余許以次日一劑立通大便病者始快其二弟亦快云定然必用大黃但前後不同耳次日戚友俱至病者出廳問藥余曰腹中原是大黃推蕩之泄糞其所以不出者以膀胱脹大腹內難容將大腸撐緊任憑極力努掙無隙可出看吾以藥通膀胱之氣不治大便而大便自至足為證驗於是以五苓散本方與服藥才入喉病者即索穢桶小便先出大便隨之頃刻泄下半桶觀者動色競稱華他再出然亦非心服也一月後小患傷風取藥四劑與葷酒雜投及傷風未止並謂治脹亦屬偶然竟沒其功然余但恨不能分身剖心指引迷津耳實無居功之意也胡卣臣先生曰世間不少血性男子然肝腦無補者多矣此段轉移全在危疑關頭著力所以為超詳述陸平叔傷寒危證治驗並釋門人之疑陸平叔文學平素體虛氣怯面色痿黃藥宜溫補不宜寒涼固其常也秋月猶患三瘧孟冬復受外寒雖逗寒熱一班而未至大寒大熱醫者以為瘧後虛邪不知其為新受實邪也投以參朮補劑轉致奄奄一息遷延兩旬間有從外感起見者用人參白虎湯略無寸效昏昏默默漫無主持彌留之頃昆弟子侄倉皇治木召昌診視以決行期之早暮非求治療也昌見其脈未大壞腹未大滿小水尚利但筋脈牽掣不停因謂此病九分可治只恐手足痿廢仲景有云經脈動惕者久而成痿今病已草三日之久血枯筋燥從可識矣吾今用法治則兼治當於仲景之外另施手眼以仲景雖有大柴胡湯兩解表裡之法而無治痿之法變用防風通聖散成方減白朮以方中防風荊芥薄荷麻黃桔梗為表藥大黃芒硝黃芩連翹梔子石膏滑石為里藥原與大柴胡之制相仿但內有當歸川芎芍藥正可領諸藥深入血分而通經脈減白朮者以前既用之貽誤不可再誤耳當晚連服二劑第一劑殊若相安第二劑大便始通少頃睡去體間津津有汗次早再診筋脈不為牽掣但陽明胃脈洪大反加隨用大劑白虎湯石膏知母每各兩許次加柴胡花粉芩柏連翹梔子一派苦寒連進十餘劑神識始得漸清粥飲始得漸加經半月始起坐於床經一月始散步於地人見其康復之難咸憂其虛抑且略一過啖即爾腹痛便泄儼似虛證昌全不反顧但於行滯藥中加用柴胡桂枝升散餘邪不使下溜而變痢以取憊然後改用葳蕤二冬略和胃氣間用人參不過五分前後用法一一不違矩矱乃克起九死於一生也門人不解謂先生治此一病藉有天幸內經云盛者責之虛者責之先生今但責其邪盛而不責其體虛是明與內經相背也余笑曰吾非騖末忘本此中奧義吾不明言金針不度也緣平叔所受外邪不在太陽而在陽明故不但不惡寒且並無傳經之壯熱有時略顯潮熱又與內傷發熱相仿誤用參朮補之邪無出路久久遂與元氣混合為一如白銀中傾入鉛銅則不成銀色所以神識昏惑默默不知有人理耳又陽明者十二經脈之長能束筋骨而利機關陽明不治故筋脈失養而動惕不寧耳然經雖陽明而治法迥出思議之表仲景云陽明居中土也萬物所歸無所復傳又云傷寒欲再傳經者針足陽明使邪不傳則愈凡此皆指已汗已下已傳經之邪為言故中土可以消受若夫未經汗下未周六經方盛之邪中土果能消之否耶所以仲景又云陽明中風脈弦浮大而短氣腹都滿脅下及心痛久按之氣不通鼻乾不得汗嗜臥一身及面目悉黃小便難有潮熱時時噦耳前後腫刺之小瘥外不解病過十日脈續浮者與小柴胡湯脈但浮無餘證老與麻黃湯若不尿腹滿加噦者不治平叔之脈弦浮大而短氣鼻乾不得汗嗜臥一身及面目悉黃過經二十餘日不解悉同此例第其腹未滿小水尚利則可治無疑然治之較此例倍難者以非一表所能辦也今為子輩暢發其義夫天包地外地處天中以生以長以收以藏玄穹不尸其功而功歸后土故土膏一動百草莫不蕃茂土氣一收萬物莫不歸根仲景之言中土但言收藏而生長之義在學者自會設偏主收藏則是地道有秋冬無春夏能化物而不能造物矣治病之機亦然平叔之病舉外邪而錮諸中土則其土為火燔之焦土而非膏沐之沃土矣其土為灰砂打和之燥土而非沖純之柔土矣焦土燥土全無生氣而望其草木之生也得乎吾乘一息生機大用苦寒引北方之水以潤澤其枯槁連進十餘劑其舌始不向唇外吮咂所謂水到渠成乃更甘寒一二劑此後絶不置力者知其飲食入胃散精於脾如靈雨霢霂日復一日優渥沾足無藉人工灌溉而中土可復稼穡之恆耳必識此意乃知吾前此濫用苦寒正以培生氣也生氣回而虛者實矣夫豈不知其素虛而反浚其生耶面議何茂倩令嬡病單腹脹脾虛將絶之候從來腫病遍身頭面俱腫尚易治若只單單腹腫則為難治此其間有所以然之故不可不辨也蓋傳世諸方皆是悍毒攻劫之法傷耗元氣虧損脾胃可一不可再之藥縱取效於一時倘至復腫則更無法可療此其一也且遍身俱腫者五臟六腑各有見證故瀉肝瀉肺瀉膀胱瀉大小腸之藥間有取效之時而單單腹腫則中州之地久窒其四運之軸而清者不升濁者不降互相結聚牢不可破實因脾氣之衰微所致而瀉脾之藥尚敢漫用乎此又其一也且腫病之可瀉者但可施之西北壯盛及田野農夫之流豈膏粱老少之所能受設謂腫病為大滿大實必從乎瀉則病後腫與産後腫將亦瀉之耶此又其一也且古方原載腫病五不治唇黑傷肝缺盆平傷心臍出傷脾背平傷肺足底平滿傷腎此五者不可治矣是其立方之意皆非為不可治之證而設後人不察概從攻瀉者何耶惟理脾一法雖五臟見不治之證而能治者尚多此又其一也張子和以汗吐下三法劫除百病後人有謂子和之書非子和之筆乃麻徵君文之者誠為知言如常仲明云世人以補劑療病宜乎不效此則過信劉張之學而不顧元氣之羸劣耳所以凡用劫奪之藥者其始非不遽消其後攻之不消矣其後再攻之如鐵石矣不知者見之方謂何物邪氣若此之盛自明者觀之不過為猛藥所攻即以此身之元氣轉與此身為難者實有如驅良民為寇之比所謂赤子盜兵弄於潢池亶其然哉明乎此則有培養一法補益元氣是也則有招納一法升舉陽氣是也則有解散一法開鬼門潔淨府是也三法雖不言瀉而瀉在其中矣無餘蘊矣胡卣臣先生曰脹滿必從乎瀉然善言瀉者補之中無非瀉也觀者須識此意始得立言之旨辨痢疾種種受證不同隨證治驗胡太夫人偶然肚腹不寧瀉下數行醫以痢疾藥治之其利轉多更引通因通用之法用九蒸大黃丸三錢下之遂擾動胃氣脹痛全不思食有似噤口痢狀余診之見六脈皆沉而伏應指模糊亟曰此非痢疾之證乃誤治之證也今但安其胃不必治痢而痢自止不必治脹痛而脹痛自止於是以四君子湯為主治少加姜蔻暖胃之藥用之二劑痢果不作但苦胃中脹痛不安必欲加入行氣之藥以冀脹消痛止而速得進食余固爭曰寧可緩於食不可急於藥蓋以前因誤治引動胃氣作楚如治亂民惟有安之之法若再加行氣則脹痛必無紀極堅持前說即用橘皮和中亦須炒而又炒絶不惹動其氣凡五日未得大便亦不惹動其便聽其緩緩痛止脹消食進便利共七日全安渾不見藥之功其實為無功之功也噫今之隨主見而圖可喜之功者即生出事端亦謂病之所有非醫之所造誰懸明鑑而令絲毫莫遁耶此所以成時醫之世界也張仲儀初得痢疾三五行即請往診行動如常然得內傷之脈而夾少陰之邪余診畢即議云此證仍宜一表一里但表藥中多用人參里藥中多用附子方可無患若用痢疾門諸藥必危之道也仲儀以平日深信徑取前藥不疑然疾勢尚未著也及日西忽發大熱身重如巨石頭在枕上兩人始能扶動人事沉困舉家惶亂忙忙服完表裡二劑次早診時即能起身出房再與參附藥二劑全安若不辨證用藥痢疾門中幾曾有此等治法乎況於疾未著而早見乎周信川年七十三歲平素體堅不覺其老秋月病痢久而不愈至冬月成休息痢一晝夜十餘行面自浮腫肌膚晦黑求治於余診其脈沉數有力謂曰此陽邪陷入於陰之證也吾當以法治之尚可痊愈明日吾自袖藥來面治於是以人參敗毒散本方煎好用厚被圍椅上坐定置火其下更以布條捲成鵝蛋狀置椅褥上墊定肛門使內氣不得下走然後以前藥滾熱與服良久又進前藥遂覺皮間有津津微潤再溉以滾湯教令努力忍便不得移身如此約二時之久皮間津潤總未乾病者心躁畏熱忍不可忍始令連被臥於床上是晚止下痢二次以後改用補中益氣湯一晝夜止下三次不旬日而全愈蓋內陷之邪欲提之轉從表出不以急流挽舟之法施之其趨下之勢何所底哉聞王星宰世兄患久痢諸藥不效蘇郡老醫進以人參敗毒散其勢瘥減大有生機但少此一段斡旋之法竟無成功故凡遇陽邪陷入陰分如久瘧久痢久熱等證當識此意使其緩緩久久透出表外方為合法若急而速則恐才出又入徒傷其正耳朱孔陽年二十五歲形體清瘦素享安佚夏月因搆訟奔走日中暑濕合內郁之火而成痢疾晝夜一二百次不能起床以粗紙鋪於褥上頻頻易置但飲水而不進食其痛甚厲肛門如火烙揚手踢足躁擾無奈余診其脈弦緊徑急不為指撓謂曰此證一團毒火蘊結在腸胃之內其勢如焚救焚須在頃刻若二三日外腸胃朽腐矣於是以大黃四兩黃連甘草各二兩入大砂鍋內煎隨滾隨服服下人事稍寧片刻少頃仍前躁擾一晝夜服至二十餘碗大黃俱已煎化黃連甘草俱煎至無汁次日病者再求前藥余診畢見脈勢稍柔知病可愈但用急法不用急藥遂改用生地麥門冬各四兩另研生汁而以天花粉牡丹皮赤芍甘草各一兩煎成和汁大碗咽之以其來勢暴烈一身津液從之奔竭待下痢止然後生津養血則枯槁一時難回今脈勢既減則火邪俱退不治痢而痢自止豈可泥潤滯之藥而不急用乎服此藥果然下痢盡止但遺些少氣沫耳第三日思食豆腐漿第四日略進陳倉米清汁緩緩調至旬余方能消穀亦見胃氣之存留一線者不可少此焦頭爛額之客耳陳汝明病痢發熱如蒸昏沉不食重不可言至第三日危急將絶方請余診其脈數大空虛尺脈倍加洪盛謂曰此兩病而湊於一時之證也內有濕熱與時令外熱相合欲成痢證尚不自覺又犯房勞而為驟寒所乘以故發熱身重不食昏沉皆屬少陰腎經外感少陰受邪原要下痢清白此因腸中濕熱已蒸成豬肝魚腦敗濁之形故色雖變而下痢則同也再用痢疾門藥一劑即刻不救矣遂忙以麻黃附子細辛湯一劑與之表散外邪得汗後熱即微減再以附子理中湯連進二劑熱退身輕能食改用黃連理中湯丸服至旬日全安葉茂卿幼男病痢噤口發熱十餘日嘔噦連聲不斷診其關脈上湧而無根再診其足脈亦上湧而無根謂其父曰此非噤口痢之證乃胃氣將絶之證也噤口痢者虛熱在胃壅遏不宣故覺其飽而不思食治宜補虛清熱兩法此因苦寒之藥所傷不能容食治惟有顓顓溫補一法而已於是以理中湯連投二劑不一時痢下十餘行遍地俱汙茂卿恐藥不對證求更方余曰吾意在先救胃氣之絶原不治痢即治痢人之大小腸盤疊腹中甚遠雖神丹不能遽變其糞今藉藥力催之速下正為美事焉可疑之遂與前藥連服三日人事大轉思食不噦痢勢亦減四日後止便糟粕以補中益氣湯調理旬日全安此可見小兒之痢縱啖傷胃者多內有積熱者少尤不宜輕用痢疾門中通套治法也浦君藝病痢疾初起有表邪未散而誤用參朮固表使邪氣深入又誤服黃連涼解大黃推蕩治經月餘胃氣不運下痢一晝夜百餘行一夕嘔出從前黃連藥汁三五碗嘔至二三次後胃與腸遂打為一家內中幽門闌門洞開無阻不但粥飲直出即人參濃膏才吞入喉已汩汩從腸奔下危急之中諸崑玉及內戚俱探余曰此證可無恐乎余曰在此用藥便有可恃吾豈不知病勢之危但無別人可任姑以靜鎮之而殫力以報知己耳於是以大劑四君子湯煎調赤石脂禹餘糧二味連連與服服後其下奔之勢少衰但腹中痛不可忍君藝曰前此下痢雖多然尚不痛服此藥而痛增未可再服矣余曰此正所謂通則不痛痛則不通之說也不痛則危痛則安何樂而不痛耶仍以前藥再進俟勢已大減才用四君子倍茯苓十餘劑全安胡卣臣先生曰閉門造車出而合轍使郡邑醫學中仿此議病先衡量所造高下然後用之則可矣面議少司馬李萍槎先生誤治宜用急療之法老先生玉體清瘦淡泊寧靜以御神病邪無從竊入雖食飲素約然三日始一更衣出孔比入孔尤約故精神有餘足以慮周當世而中外倚毗壯猷也偶因大便後寒熱發作有時頗似外感其實內傷非感也緣素艱大便努掙傷氣故便出則陰乘於陽而寒頃之稍定則陽復勝陰而熱也若果外感之寒熱何必大便後始然耶此時但宜以和平之劑治內傷輔養元氣為上加入外感藥驅導兼行必致內傷轉增奈何先生方欲治腸中之燥醫家又欲除內蘊之濕不思腸燥為相安之恆可以不治即治之不過潤腸生血亦無不可若乃見為濕熱而用滑利之藥以驅導之則誤甚矣蓋瘦人身中以濕為實有濕則潤無濕則燥今指燥為濕是指火為水也且膀胱者水道也大腸者穀道也以三日一便之腸誤用滑藥轉致澼出無度猶不悔悟每一大遺輒矜祛濕之力世間豈有濕從穀道而出之理哉不過因主人暫快大腸之潤而謬飾其詞耳詎知滄海不足以實漏卮而元氣日削乎始之陰陽交勝者漸至交離而陰從瀉傷陽從汗傷兩寸脈浮而空陽氣越於上關尺脈微而細陰氣越於下不相維附勢趨不返矣然汗出尚有時而下痢則無時究竟陰陽之氣兩竭於下便出急如箭肛門熱如烙此時尚以滑石木通豬苓澤瀉等分利小水以止泄不知陰虛自致泉竭小便從何得來止令數十年大腸之積蓄盡空仰給於胃脘食入毋俟停留已挈柄而挹之下注久久胃不能給遂將腸中自有之垢暗行驅下其臭甚腥色白如膿垢盡而腸氣亦不留只是周身元氣至寶坐耗於空虛之府非不服人參大補然藥力入胃則腸空入腸則胃空便出則腸胃俱空繇是下空則上壅胸膈不舒喉間頑痰窒塞口燥咽乾徹夜不寐一切食物惟味薄質輕者胃中始愛而受之此時尚圖養血安神調脾祛痰曠日緩治其不達時宜也甚矣夫宣房瓠子之決天子公卿咸輕擲金馬璧雞奠之以策群力而襄底定請以朝廷破格之法而通於醫藥可乎草野罔識忌諱或者可與圖功耳附藥議方用人參白朮甘草山茱萸五味子宣木瓜白芍藥升麻赤石脂禹餘糧人參白朮茯苓甘草為四君子湯理脾胃之正藥也而不用茯苓者以其淡滲恐傷陰也而用山茱萸以收肝氣之散五味子以收腎氣之散宣木瓜以收胃氣之散白芍藥以收脾氣及臟氣之散合之參朮之補甘草之緩升麻之升陰陽兩和俾元氣上者下而下者上團聚於中不散斯脈不至上盛腹不至雷鳴汗不至淋漓肛不至火熱食飲自加便泄自止是收氣之散為吃緊關頭故取四味重復藉其顓力至於用澀以固脫藥味多般不同此用禹餘糧石脂者取其顓固下焦之脫也況腸胃之空非二味不填腸垢已去非二味不復其黏著之性所謂下焦有病人難會須用餘糧赤石脂者以是故也又況誤以石之滑者傷之必以石之澀者救之尤有同氣相求之義耶所以必用大劑藥料煎濃膏調二味服下恐藥力清薄不遂其留戀故以啜羹之法用之取其久停又以飲醇之法用之取其緩入非謂一飲盡劑強以所難也先生弗解其意見藥劑過重謂為難用醫者見二味澀藥又從旁破為不可用不知十劑中澀居其一如七曜經天何可少一曜耶且石脂不過土之赤者也餘糧不過土之外剛內柔者也中州土病而引土為治尚謂不宜則諸草木之根荄更無取矣東海西海天下後世有明者出焉理自相同光自不掩必求行其所知則賤者售而病乃殆矣謂之何哉先生聞名而請極其敬重及見議病議方反多疑意不才即於方末慨嘆數語飄然而別次日先生語戚友云昨之論辨甚明但石脂餘糧生平未曾服過即婁中醫者亦未曾用過只得附未達不敢嘗之義華天御孝廉薦治陳彥質之病比先生更重幾倍用石脂餘糧而收成功其案具存可復閲也其後往郡迎醫用補劑稍效然不善於補轉致夜間健食脾氣泄露無餘肛門火烙陽氣下陷久而不升遂成臀癰竟付外科治瘳吁嗟先生獨何不身事視國也哉胡卣臣先生曰萍槎司馬揚歷中外清剛曉練今之顯允方叔也從津門歸朝命再下倚任方殷司馬淹留抱疴竟至不起使用嘉言之言即以疆場死不猶愈易簀家臣之手耶面議陳彥質臨危之證有五可治陳彥質患腸風下血近三十年體肥身健零星去血旋亦生長不為害也舊冬忽然下血數斗蓋謀慮憂鬱過傷肝脾肝主血脾統血血無主統故出之暴耳彼時即宜大補急固延至春月則木旺土衰脾氣益加下溜矣肝木之風與腸風交煽血盡而下塵水水盡而去腸垢垢盡而吸取胃中所納之食汩汩下行總不停留變化直出如箭以致肛門脫出三五寸無氣可收每以熱湯浴之睜叫托入頃之去後其肛復脫一晝夜下痢二十餘行苦不可言面色浮腫夭然不澤唇焦口乾鼻孔黑煤種種不治所共睹矣僕診其脈察其證因為借箸籌之得五可治焉若果陰血脫盡則目盲無所視今雙眸尚炯是所脫者下焦之陰而上焦之陰猶存也一也若果陽氣脫盡當魄汗淋漓目前無非鬼像今汗出不過偶有而見鬼亦止二次是所脫者脾中之陽而他臟之陽猶存也二也胃中尚能容谷些少未顯嘔吐噦逆之證則相連臟腑未至交絶三也夜間雖艱於睡然交睫時亦多更不見有發熱之候四也脈已虛軟無力而激之間亦鼓指是稟受原豐不易摧朽五也但脾臟大傷兼以失治曠日其氣去絶不遠耳經云陽氣者如天之與日失其所則折壽而不彰今陽氣陷入陰中大股熱氣從肛門泄出如火之烙不但失所已也所以猶存一線生意者以他臟中未易動搖如輔車唇齒相為倚藉供其絶乏耳夫他臟何可恃也生死大關全於脾中之陽氣復與不復定之陽氣微復則食飲微化便泄微止肛門微收陽氣全復則食飲全化便泄全止肛門全收矣然陰陽兩竭之餘偏駁之藥既不可用所藉者必參朮之無陂復氣之中即寓生血始克有濟但人參力未易辦況才入胃中即從腸出不得不廣服以繼之此則存乎自裁耳於是以人參湯調赤石脂末服之稍安次以人參白朮赤石脂禹餘糧為丸服之全愈其後李萍槎先生之病視此尚輕數倍乃見石脂餘糧之藥駭而不用奈之何哉胡卣臣先生曰似此死裡求生誰不樂從其他拂情處不無太直然明道之與行術則徑庭矣論黃湛侯吐血暴證治驗黃湛侯素有失血病一晨起至書房陡爆一口傾血一盆喉間氣湧神思飄蕩壯熱如蒸頸筋粗徑診其脈尺中甚亂曰此昨晚太犯房勞自不用命也因出驗血見色如太陽之紅其僕云此血如宰豬後半之血其來甚遠不識癡人有此確喻再至寢室謂曰少陰之脈縈舌本少陰者腎也今腎中之血洶湧而出舌本已硬無法可以救急因諦思良久曰只有一法不得已用丸藥一服墜安元氣若氣轉丹田尚可緩圖因煎人參濃湯下黑錫丹三十粒喉間汩汩有聲漸下入腹頃之舌柔能言但聲不出余亟用潤下之劑以繼前藥遂與阿膠一味重兩許溶化分三次熱服溉以熱湯半日服盡身熱漸退徑筋漸消進粥與補腎藥連服五日聲出喉清人事向安但每日尚出深紅之血盞許因時令大熱遵內經熱淫血溢治以鹹寒之旨於補腎藥中多加秋石服之遂愈胡卣臣先生曰此等治法全在批郤導窾處用意未許向癡人說夢論聞君求血證兼痰證治法聞君求有失血疾時一舉發其出頗多咳嗽生痰上氣面青少澤其脈厥陰肝部獨傷原於忿怒之火無疑合色脈諦詳總是陰血不足也但從前所用之藥本以生血反滋其痰本以驅痰轉耗其血似是而非誰其辨之夫脈之充也色之華也皆氣與血為之也以脫血故致令氣亦易脫每每上升胸膈喘促脹悶不利於語言行持雖舉發有時然非細故矣乃用行氣藥以取快何異操刀使割耶誠欲氣不上升無過於血日滋長暗將浮游之氣攝入不息之途乃為良治然胸膈肺胃間頑痰膠結既阻循環又難培養似乎痰不亟除別無生血之法矣不知此證而欲除痰痰未必除氣已先盡不得之數也從來痰藥入腹其痰不過暫開復閉勞而無功吾於此每用乘機利導之法先以微陽藥開其痰繼以純陰峻投如決水轉石亟過痰之關隘逮至痰之開者復閉所用生血之藥早已從天而下日續一日久久而血生血生而氣返血室如浪子歸家轉能興家所藉以驅膠結之痰者即此氣也此際始加除痰之藥庶幾痰去氣存纍年之疾至是始得痊安耳然飲食最宜致慎不但肥甘生痰厚味傷陰已也人身自平旦至日中行陽二十五度飲食易消故不成痰自日中至合夜行陰二十五度飲食不消故易成痰釋教以過午戒食其大藥王護身之一則歟進之調攝尤為緊關蓋賢人嘗以秋冬養陰秋者於時為收冬者於時為藏法天地之收藏而寧茹毋吐寧拒毋迎寧早臥毋早興蟄蟲尚知閉戶豈君子可無居室之功耶況乎欲血不再脫尤貴退藏於密耶又況乎厥陰肝木受病其憔悴之色見於三時者猶可諉之病色至春月發榮之時更何諉耶然春月之榮不自春月始也始於秋冬收藏之固設冬月水臟所儲者少春月木即欲發榮其如泉竭不足以溉苞稂何故失此不治至春病危始圖之則萬無及矣胡卣臣先生曰捫蝨而談可驚四座為顧枚先議失血證治並論病機顧枚先年二十餘歲身軀肥大平素嗜酒邇來鰥居鬱郁壬午孟夏患失血證每晚去血一二盞至季夏時去血無算面色不見憔悴肌肉不見消瘦診其脈亦不見洪盛晝夜亦不見寒熱但苦上氣喘促夜多咳嗽喉間窒塞胸前緊逼背後刺脹腹中悶痛躁急多怒醫以人參阿膠治失血成法用之月餘逾增其勢更醫多方以圖用膏子之潤上而氣時降也用牛膝黃柏之導下而血時息也及服酒研三七少許則血止而咳亦不作但未久血復至咳復增又以為龍雷之火所致思用八味丸中之些微桂附以引火歸原總繇未識病情也請因是證而益廣病機焉人身血為陰男子不足於陰故以血為寶是以失血之證陰虛多致發熱面色多致枯黑肌肉多致消瘦今病者不然豈其有餘於血哉以病為飲醇傷胃胃為水穀之海多氣多血二十餘年水穀充養之精華以漸內虧而外不覺也胃之脈從頭走足本下行也以嘔血之故逆而上行則呼吸之音必至喘急矣胃之氣傳入大小腸膀胱等處亦本下行也以屢嘔之故上逆而不下達則腸腹之間必致痛悶矣胃氣上奔嘔逆橫決則胸中之氣必亂至於緊逼痛楚則亂之甚矣胸中之位舍有限已亂之氣無處可容勢必攻入於背以背為胸之府也至於肩髃骨空鑽如刃刺則入之深矣故一胃耳分為三脘上脘氣多下脘血多中脘氣血俱多今胃中既亂氣血混矣不但胃也胃之上為膈其心煩多怒者正內經所謂血並於膈之上氣並於膈之下致然氣血倒矣所以內經又言血並於陽氣並於陰乃為熱中又言疸成為消中疸即熱也消中者善食多飢而肌肉暗減也病者之嗜飲為熱積胃中其不病消中而病嘔血者何耶內經又以胃脈本宜洪盛反得沉細者為胃氣已逆若見人迎脈盛則熱聚於胃而內生癰今胃脈已見沉細其不成胃癰而成嘔血者又何耶不知病者嘔血之源與此二者同出異名耳熱積於中即為消血積於中即為癰而隨積隨嘔則為此證揆其致此之繇必以醉飽入房而得之蓋人身氣動則血動而搆精時之氣有乾坤鼓鑄之象其血大動精者血之所化也灌輸原不止胃之一經獨此一經所動之血為醉飽之餘所阻不能與他經之血緝續於不息之途是以開此脫血一竇今者竟成熟路矣欲治此病不如此其分經辨證何從措手乎豈惟經也絡亦宜辨胃之大絡貫膈絡肺不辨其絡亦孰知膈間緊迸肺間氣脹痰膠為胃病之所傳哉當此長夏土旺不惟母病而子失養抑且母邪盡傳於子至三秋燥金司令咳嗽喘滿之患必增不急治之則無及矣今歲少陰司天少陰之上熱氣主之運氣熱也夏月適當暑熱時令熱也而與胃中積熱合煽其虐不治其熱血必不止然不難於血之止也第患其止而聚也聚於中為蠱為癰猶緩也聚於上為喘為厥則驟也惟遵內經熱淫血溢治以鹹寒之旨為主治咸能走血寒可勝熱庶於消渴癰疽兩患可無妨礙然必先除經病務俾經脈下走經氣下行後乃可除絡中之病譬溝渠通而行潦始消也未易言也病者嘔血經久無法可止父兄敦請僕往救治告以必須議病不議藥方能用豫乃定是案用玄明粉化水煮黃柏秋石化水煮知母以清解蘊熱而消瘀化疽加甘草以調其苦獨取鹹寒氣味進四劑而血止可謂神矣醫者果然破藥性太寒渠家果不終其用延至八月病者胸脅高腫數圍肺內生癰寒熱大作喘咳不休食飲不入俯幾不敢動移以致瘠肉磨穿危在呼吸百計強與醫治斷不應命父兄因生仇恨再求為其所難以曲盡人情只得極力治之變證蜂出通計免於五死而得五生病者不戒兼啖生冷肺復生癰一夕嘔痰如豬膽狀者百十餘枚一臟兩傷竟至不起僕焦勞百日心力俱殫第無如末流難挽何哉胡卣臣先生曰向傳顧病治愈競稱神仙其後未免以成敗論矣倘用鹹寒時遇有識者贊之何至渴而穿井鬥而鑄兵耶然此案自堪傳也面論顧季掖乃室奇證治之奇驗顧季掖乃室仲夏時孕已五月偶爾下血醫以人參阿膠勉固其胎又經一月身腫氣脹血逆上奔結聚於會厭胸膈間食飲才入觸之痛楚轉下甚艱稍急即連粒嘔出全如噎證更醫數手咸以為胎氣上逼脾虛作腫而成膈噎也用人參之補五味之收為治延至白露節計孕期已八月而病造極中之極呼吸將絶始請余診毫不泄露病狀其脈尺部微澀難推獨肺部洪大無倫其喘聲如曳鋸其手臂青紫腫亮如毆傷色余駭曰似此凶證何不早商季掖曰昨聞黃咫旭乃室有孕而膈噎得遇良治而愈是以請救但內子身腫氣急不識亦可療否余曰此證吾視若懸鑑不必明言以滋驚恐姑以善藥一二劑投之通其下閉上壅可也季掖必求病名余曰上壅者以肺脈之洪大合於會厭之結塞知其肺當生癰也下閉者以尺脈之微澀合於肉色之青腫知其胎已久壞也善藥者瀉白散加芩桔之苦以開之不用硝黃等厲藥也服一大劑腹即努痛如欲産狀季掖曰産乎余曰肺氣開而下行數時閉拒惡穢得出可也奚産之云再進一劑身腫稍退上氣稍平下白汙如膿者數斗裹朽胎而出旬余尚去白汙並無點血相間可知胎朽腹中已近百日蔭胎之血和胎俱化為膿也病者當時胸膈即開連連進粥神思清爽然朽胎雖去而穢氣充斥周身為青腫者未去也胸厭雖寬而肺氣壅遏為寒熱咳嗽者未除也余認真一以清肺為主旬余果獲全痊顧生升恆曰先生議內子病余甚駭為不然及投劑如匙開鑰其言果驗朽物既去忽大腫大喘可畏先生一以清肺藥批郤導窾病邪旋即解散不二旬體復康平抑何神耶內子全而老母不至尸饔幼子不至啼飢此身不至隻影厚德固難為報耳因思談醫如先生真為軒岐繼後世俗之知先生者即謂之謗先生可也然而百世之下猶當有聞風與起者矣昆庠晚學顧升恆季掖甫謹識於案末面論姜宜人奇證與交腸不同治法迥異姜宜人得奇證簡本草經疏治交腸用五苓散之說以為神祕余見之辨曰交腸一證大小二便易位而出若交易然古用五苓治之專為通前陰而設也若此證閉在後陰二便俱從前陰而出擬之交腸誠有似是實非者況交腸乃暴病驟然而氣亂於中此證乃久病以漸而血枯於內有毫釐千里之不同安得擬之原夫疾之所始始於憂思結而傷脾脾統血者也脾傷則不能統攝而錯出下行有若崩漏實名脫營脫營病宜大補急固乃誤認為崩漏以涼血清火為治則脫出轉多不思天癸已盡潮汛已絶萬無是病其年高氣弱無血以實漏卮者毫不念也於是胞門子戶之血日漸消亡勢不得不借資不仰給矣藉資於大腸轉將大腸之血運輸而滲入胞囊久之大腸之血亦盡而大腸之氣附血而行者孤而無主為拳為塊奔疼渙散與林木池魚之殃禍同矣又如救荒者剝鄰國為立盡之墟所不顧矣猶未也仰給於胃脘轉將胃脘之血吸引而滲入胞囊久之胃脘之血亦盡下脫之血始無源自止夫胃脘之血所以榮周身而灌百脈者今乃暗歸烏有則苞稂失潤而黍離足憂血盡而止較之血存而脫又倍遠矣故血盡然後氣亂氣亂然後水穀舍故趨新舍寬趨隘江漢兩渠並歸一路身中為之大亂勢必大腸之故道復通乃可撥亂返治與五苓一方全無干涉又況水穀由胃入腸另有幽門泌別清濁今以滲血之故釀為穀道是幽門闢為坦徑矣尚可用五苓再闢之乎又況五苓之劫陰為亡血家所深戒乎今之見一病輒有一藥橫於胸中與夫執成方奉為靈祕者大率皆誤人者也若宜人之病餘三指才下便問曰病中多哭泣否婢媼曰時時泣下乃知臟燥者多泣大腸方廢而不用也交腸云乎哉今大腸之脈纍纍而現於指可虞之時其來春棗葉生乎棗葉生而言果驗胡卣臣先生曰此等證他人不能道隻字似此河漢無極而更精切不可移易為難能矣治陸令儀尊堂肺癰奇驗陸令儀尊堂平日持齊腸胃素枯天癸已盡之後經血猶不止似有崩漏之意余鑑姜宜人交腸之流弊急為治之久已痊可值今歲秋月燥金太過濕蟲不生無人不病咳嗽而尊堂血虛津枯之體受傷獨猛胸脅緊脹上氣喘急臥寐不寧咳動則大痛痰中帶血而腥食不易入聲不易出寒熱交作而申酉二時燥金用事諸苦倍增其脈時大時小時牢時伏時弦緊服清肺藥如以勺水沃焦無裨緩急諸子倣徨無措知為危候余亦明告以肺癰將成高年難任於是以葶藶大棗瀉肺湯先通其肺氣之壅即覺氣稍平食稍入痰稍易出身稍可側大有生機余曰未也吾見來勢太急不得已而取快於一時究竟暫開者易至復閉逮復閉則前法不可再用迄今乘其暫開多方以圖必在六十日後交冬至節方是愈期蓋身中之燥與時令之燥膠結不解必俟燥金退氣而肺金乃得太寧耳令儀昆季極懇專力治之此六十日間屢危屢安大率皆用活法斡旋緣肺病不可用補而脾虛又不能生肺肺燥喜於用潤而脾滯又艱運食今日脾虛之極食飲不思則於清肺藥中少加參朮以補脾明日肺燥之極熱盛咳頻則於清肺藥中少加阿膠以潤燥日續一日扶至立冬之午刻病者忽然云內中光景大覺清爽可得生矣奇哉天時之燥去而肺金之燥遂下傳於大腸五六日不一大便略一潤腸旋即解散正以客邪易去耳至小雪節康健加飧倍於曩昔蓋胃中空虛已久勢必加飧復其水穀容受之常方為全愈也令儀昆季咸録微功而余於此證有退思焉語云寧醫十男子莫醫一婦人乃今寧醫十婦人不醫一男子矣胡卣臣先生曰還丹不過九轉舉世模之不就陳詮可襲活法難通也議郭臺尹將成血蠱之病郭臺尹年來似有勞怯意胸腹不舒治之罔效茫不識病之所存也聞僕治病先議後藥姑請診焉見其精神言動俱如平人但面色痿黃有蟹爪紋路而得五虛脈應之因竊疑而詰之曰足下多怒乎善忘乎口燥乎便祕乎胸緊乎脅脹乎腹疼乎渠曰種種皆然此何病也余曰外證尚未顯然內形已具將來血蠱之候也曰何以知之曰合色與脈而知之也夫血之充周於身也榮華先見於面今色黯不華既無舊恙又匪新疴其所以憔悴不榮者何在且壯盛之年而脈見細損宜一損皮毛二損肌肉三損筋骨不起於床矣乃皮毛肌肉步履如故其所以微弱不健者又何居是敢直斷為血蠱腹雖未大而腹大之情形已著如瓜瓠然其日趨於長也易易耳明哲可不見機於早耶曰血蠱乃婦人之病男子亦有之乎曰男子病此者甚多而東方沿海一帶比他處更多醫不識所繇來漫用治氣治水之法嘗試夭枉不可勝計總緣不究病情耳所以然者以東海擅魚鹽之饒魚者甘美之味多食使人熱中鹽者鹹苦之味其性偏於走血血為陰象初與熱合不覺其病日久月增中焦沖和之氣亦積漸而化為熱矣氣熱則結而血始不流矣於是氣居血中血裹氣外一似婦女受孕者然至彌月時腹如抱甕矣但孕繫於胞中如熟果自落蟲蟠於腹內如負贅難療又不可同語也究而論之豈有東方之水土致然凡五方之因膏粱厚味椒薑桂糈成熱中者除癰疽消渴等症不常見外至脹滿一症人人無不有之但微則旋脹旋消甚則脹久不消而成蟲耳倘能見微知著寧至相尋於覆轍耶要知人之有身執中央以運四旁者也今中央反竭四旁以奉其錮尚有精華髮見於色脈間乎此所以脈細皮寒少食多汗尫羸之狀不一而足也余言當不謬請自揆之月餘病成竟不能用半載而逝胡卣臣先生曰議病開此一法門後有學者不可及矣答門人問州守錢希聲先生吐血治法門人問曰州尊暴病嘔血數升指尖微冷喉間窒塞聲不易出安危之機關於醫藥有用溫補人參阿膠之屬者有用涼血生地玄參之屬者有用降火黃柏知母之屬者漫難適從請吾師確言其理以開瞽瞶答曰古今論失血之症皆混在痰火一門是以言之不中肯窾吾試為子詳之夫血病有新久微甚無不本之於火然火有陰陽不同治法因之迥遠州尊雖舊嘗失血不過傷損之類其原頗輕今入春以來忽爾嘔血數盂則出之暴矣經云暴病非陽則其為火也即非陽火甚明陽火者五行之火天地間經常可久之物何暴之有設其暴也復可以五行之水折之不能暴矣惟夫龍雷之火潛伏陰中方其未動不知其為火也及其一發暴不可御以故載陰血而上溢蓋龍雷之性必陰雲四合然後遂其升騰之勢若天青日朗則退藏不動矣故凡用涼血清火之藥者皆以水制火之常法施之於陰火未有不轉助其虐者也大法惟宜溫補而溫補中之微細曲折要在講明有素經曰少陰之脈縈舌本謂腎脈縈繞於舌根之間也又曰咯血者屬腎明乎陰火發於陰中其血咯之成塊而出不比咳嗽癆症痰中帶血為陽火也此義從前未有發明惟漢代張仲景為醫中之聖於傷寒症中垂戒一款云誤發少陰汗動其經血者下竭上厥為難治後人隨文讀去至下竭上厥之理總置不講不知下竭者陰血竭於下也上厥者陰氣逆於上也蓋氣與血兩相維附氣不得血則散而無統血不得氣則凝而不流故陰火動而陰氣不得不上奔陰氣上奔而陰血不得不從之上溢陰血上溢則下竭矣血既上溢其隨血之氣散於胸中不能復返本位則上厥矣陰氣上逆不過至頸而止不能越高巔清陽之位是以喉間窒塞心忡耳鳴胸膈不舒也然豈但窒塞不舒已哉陰氣久居於上勢必龍雷之火應之於下血不盡竭不止也氣不盡厥亦不止也仲景所以斷為難治者其以是乎但止曰難治非謂不治也仲景不立治法者以另有卒病論一十六卷專論暴病後世散逸無傳耳吾為子大辟其扃則以健脾中陽氣為第一義健脾之陽一舉有三善也一者脾中之陽氣旺如天青日朗而龍雷潛伏也一者脾中之陽氣旺而胸中窒塞之陰氣如太空不留纖翳也一者脾中之陽氣旺而飲食運化精微復生其下竭之血也況乎地氣必先蒸土為濕然後上升為云若土燥而不濕地氣於中隔絶矣天氣不常清乎今方書皆治陽火之法至龍雷之火徒有其名而無其治反妄引久嗽成癆痰中帶血之陽症不敢用健脾增咳為例不思咯血即有咳嗽不過氣逆上厥之咳氣下則不咳矣況於原無咳嗽者乎古方治龍雷之火每用桂附引水歸原之法然施於暴血之症可暫不可常蓋已虧之血恐不能制其悍而未動之血恐不可滋之擾耳究而論之治龍雷之火全以收藏為主以秋冬則龍潛雷伏也用收藏藥不效略用燥烈為嚮導以示同氣相求之義則可既以收藏寧敢漫用燥烈乎先生宿有損傷失血之病值此上下交匱功令森嚴人心欲逞惴惴其不免是勞傷又益以憂恐恐則傷腎而少陰之血無端溢出與仲景所謂誤發少陰汗動其血者初無少異矣又況肝主謀慮性喜疏泄冬間腎氣不藏久已供肝木之挹取今春令將行而肝木居青龍之位震雷之司乘權用事是以天時之龍雷未動身中之龍雷先動其血已暴湧而出不識後此春夏十二氣龍雷大發之時將何血以奉之耶夫大病須用大藥大藥者天時春夏而吾心寂然秋冬是也昔人逃禪二字甚妙夫禪而名之曰逃其心境為何如哉子後遇此病必以崇土為先土厚則陰濁不升而血患必止萬物以土為根元氣以土為宅不可不亟講矣胡卣臣先生曰今世失血一症甚多前後四案發明無窮奧義垂誨殷殷此篇詳論陰火原委尤補千古闕失李思萱乃室膈氣危症治驗李思萱室人有孕冬日感寒至春而發初不覺也連食雞面雞子遂成夾食傷寒一月才愈又傷食物吐瀉交作前後七十日共反五次遂成膈症滴飲不入延診時其脈上湧而亂重按全無嘔噦連綿不絶聲細如蟲鳴久久方大嘔一聲余曰病者胃中全無水穀已翻空向外此不可救之症也思萱必求良治以免余憾余籌畫良久因曰萬不得已必多用人參但才入胃中即從腸出有日費鬥金不勾西風一浪之譬奈何渠曰盡在十日之內尚可勉備余曰足矣乃煎人參湯調赤石脂末以墜安其翻出之胃病者氣若稍回少頃大便氣即脫去凡三日服過人參五兩赤石脂末一斤俱從大便瀉出得食仍嘔但不嘔藥耳因思必以藥之渣滓如粞粥之類與服方可望其少停胃中頃之傳下又可望其少停腸中於是以人參陳橘皮二味剪如芥子大和粟米同煎作粥與服半盞不嘔良久又與半盞如是再三日始得胃舍稍安但大腸之空尚未填實復以赤石脂末為丸每用人參湯吞兩許如是再三日大便亦稀此三日參橘粥內已加入陳倉米每進一盞日進十餘次人事遂大安矣仍用四君子湯丸調理通共用人參九兩全愈然此亦因其胎尚未墮有一線生氣可續故為此法以續其生耳不然者用參雖多安能回元氣於無何有之鄉哉後生一子小甚緣母疾百日失蔭之故附葉氏婦治驗葉氏婦亦傷寒將發誤食雞面雞子大熱喘脹余憐其貧乘病正傳陽明胃經日間與彼雙表去邪夜間即以酒大黃玄明粉連下三次大便凡十六行胎仍不動次早即輕安薄粥將養數日全愈此蓋乘其一日驟病元氣大旺盡驅宿物以免纏綿也設泥有孕而用四物藥和合下之則滯藥反為食積樹黨矣胡卣臣先生曰前治神矣後治復不減蓋前治明後治良也行所明以持危扶顛藉有天幸者多矣此嘉言所以昭述其事亦曰不得已歟辨黃咫旭乃室膈氣危症宜用緩治法果驗咫旭乃室病膈氣二十餘日飲粒全不入口延余診時尺脈已絶而不至矣詢其二便自病起至今從未一通止是一味痰沫上湧厭厭待盡無法以處邑庠有施姓者善決生死謂其脈已離根頃刻當壞余曰不然脈經明有開活一款云上部有脈下部無脈其人當吐不吐者死是吐則未必死也但得天氣下降則地道自通故此症倍宜治中以氣高不返中無開闔因成危候待吾以法緩緩治之自然逐日見效於是始獨任以觀驗否乃遂變旋覆代赭成法而用其意不泥其方緣女病至尺脈全無則莫可驗其受孕萬一有而不求以赭石乾薑輩傷之呼吸立斷矣姑闕疑以赤石脂易赭石煨姜易乾薑用六君子湯加旋覆花煎調服下嘔即稍定其嶽父見用人參以為劫病而致憾余曰無恐也治此不愈願以三十金為罰如愈一文不取乃全神照應藥必親調始與服之三日後漸漸不嘔又三日後粥飲漸加舉家稱快但病者全不大便至是已月餘矣一則憂病之未除再則憂食之不運刻刻以通利為囑余曰臟氣久結食飲入胃每日止能透下腸中一二節食飲積之既久臟氣自然通透原議緩治何得急圖耶舉家僉以余為不情每進診脈輒聞病者鼻息之揚但未至發聲相詈耳蓋余以歸地潤腸之藥恐滯膈而作嘔硝石大黃通腸之藥恐傷胎而殞命姑拂其請堅持三五日果氣下腸通而病全瘳矣病瘳而其家竊議曰一便且不能通曷貴於醫耶月餘腹中之孕果漸形著又議曰一孕且不能知安所稱高耶吁嗟余之設誠而行以全人夫妻子母而反以得謗也豈有他哉惟余得謗當世之所謂醫者然後乃得名耳胡卣臣先生曰議病入理之深自然入俗之淺如中無開闔之語及臟氣逐日漸通之語豈堪向尋常索解耶面議倪慶雲危症再生治驗倪慶雲病膈氣十四日粒米不入咽始吐清水次吐緑水次吐黑水次吐臭水呼吸將絶醫已歇手余適診之許以可救渠家不信余曰盡今一晝夜先服理中湯六劑不令其絶來早轉方一劑全安渠家曰病已至此滴水不能入喉安能服藥六劑乎余曰但得此等甘溫入口必喜而再服不須過慮渠諸子或庠或辨亦知理折僉曰既有妙方何不即投見效必先與理中然後乃用此何意耶余曰金匱有云病人噫氣不除者旋覆代赭石湯主之吾於此病分別言之者有二道一者以黑水為胃底之水臭水為腸中之水此水且出則胃中之津液久已不存不敢用半夏以燥其胃也一者以將絶之氣止存一絲以代赭墮之恐其立斷必先以理中分理陰陽俾氣易於降下然後代赭得以建奇奏績一時之深心即同千古之已試何必更疑及簡仲景方見方中止用煨姜而不用幹姜又謂乾薑比半夏更燥而不敢用余曰尊人所噫者下焦之氣也所嘔者腸中之水也陰乘陽位加以日久不食諸多蛔蟲必上居膈間非乾薑之辣則蛔蟲不下轉而上氣亦必不下轉妙處正在此君曷可泥哉諸子私謂言有大而非誇者此公頗似姑進是藥觀其驗否進後果再索藥三劑後病者能言云內氣稍接但恐太急俟天明再服後旦轉方為妥至次早未及服藥復請前醫參酌衆醫交口極沮渠家並後三劑不肯服矣余持前藥一盞勉令服之曰吾即於衆醫前立地轉方頃刻見效再有何說乃用旋覆花一味煎湯調代赭石末二茶匙與之才一入口病者曰好藥吾氣已轉入丹田矣但恐此藥難得余曰易耳病者十四日衣不解帶目不交睫憊甚因圖脫衣安寢冷氣一觸復嘔與前藥立止思粥令食半盞渠飢甚竟食二盞少頃已食六盞復嘔與前藥立止又因動怒以物擊婢復嘔與前藥立止以後不復嘔但困倦之極服補藥二十劑丸藥一斤將息二月始能遠出方悔從前少服理中二劑耳胡卣臣先生曰旋覆代赭一方案中屢建奇績但醫家未肯信用熟讀前後諸案自了無疑惑矣論吳聖符單腹脹治法聖符病單腹脹腹大如箕緊硬如石胃中時生酸水吞吐皆然經年罔效蓋由醫輩用孟浪成法不察病之所起與病成而變之理增其勢耳昨見云間老醫煎方龐雜全無取義惟腎氣丸一方猶是前人已試之法但此病用之譬適燕而南其指也夫腎氣丸為腫脹之聖藥者以能收攝腎氣使水不泛溢耳今小水一晝夜六七行溝渠順導水無泛濫之虞也且謂益火之源以消陰翳耳今酸味皆從火化尚可更益其火乎又有指腹脹為食積用局方峻攻尤屬可駭僕不得不疏明其旨夫聖符之疾起於脾氣不宣鬱而成火使當時用火鬱發之之法升陽散火病已豁然解矣惟其愈郁愈湮漸至脹滿則身中之氣一如天地不交而成痞塞病成而變矣證似無火全以火為之根不究其根但治其脹如檳榔厚朴萊蔔子之類皆能耗氣助火於是病轉入胃日漸一日煎熬津液變成酸汁胃口有如醋甕胃中之熱有如麴櫱俟谷飲一入頃刻釀成酢味矣有時新谷方咽舊谷即為迸出若互換者緣新谷芳甘未變胃愛而受之其酸腐之餘自不能留也夫人身天真之氣全在胃口今暗從火化津液升騰屑越已非細故況土曰稼穡作甘者也木曰曲直作酸者也甘反作酸木來侮土至春月木旺時必為難治及今可治又治其脹不治其酸曾不思酸水入腹脹必愈增不塞源而遏流其勢有止極耶試言其概治火無過虛補實瀉兩法內郁雖宜從補然甘溫除熱瀉火之法施於作酸日其酸轉增用必無功故驅其酸而反其甘惟有用剛藥一法剛藥者氣味俱雄之藥能變胃而不受胃變者也參伍以協其平但可用剛中之柔不可用柔中之剛如六味丸加桂附柔中之剛也於六味作酸藥中入二味止酸藥當乎不當乎剛中之柔如連理湯是也剛非過剛更有柔以濟其剛可收去酸之績矣酸去而後治脹破竹之勢已成迎刃可解錮疾頓蠲脾君復辟保合太和常有天命矣謂用藥者後先銖兩間可無審乎善後多年聞用黃柏知母之屬始得全效更奇剛柔諸藥為丸服之胸中如天地交而成泰爽不可言脹病遂不勞餘力而愈附論善後之法門人請曰吾師治病每每議先於藥究竟桴鼓相應纖毫不爽今果酸止脹消臍收腹小奏全績矣不識意外尚有何患懇同善後之法究極言之余答曰悉乎哉問也內經病機劉河間闡發頗該至於微茫要渺不能言下盡傳吾為子益廣其義夫病有逆傳順傳種種不同所謂病成之機則然至於病去之機從來無人道及前論聖符之病乃自脾入傳於胃今酸去脹消亦自胃返於脾故善後之法以理脾為急而胃則次之其機可得言也設胃氣未和必不能驅疾惟胃和方酸減谷增漸復平人容蓄之常然胃喜容蓄脾未喜健運倦怠多睡惟樂按摩者有之受食一盞身若加重受食三盞身重若加一鈞者有之步履雖如常候然登高涉險則覺下輕上重舉足無力身重肢疲頭昏氣急者有之脾陽弗旺食後喜溉沸湯藉資於有形之熱者有之其病之餘有夏熱為疸秋涼為瘧燥勝脾約濕勝脾泄者有之故理脾則百病不生不理脾則諸疾續起久之乃入於胃也至若將息失宜飲食房勞所犯脾先受之猶可言也設忿怒之火一動則挾木邪直侵胃土原病陡發不可言也語以一朝之忿亡身及親為惑垂戒深矣又其始焉酸脹胃中必另創一膜囊如贅龐者乃肝火衝入透開胃膜故所聚之水暗從木化變酸久久漸滿膜囊垂大其腹之脹以此為根觀其新谷入口酸物迸出而芳谷不出及每食飴糖如汲筒入喉酸水隨即湧出皆可徵也若非另一窠臼則其嘔時宜新腐俱出如膈氣之類何得分別甚清耶昨遊玉峰渠家請授他醫調攝之旨及語以另闢膜囊其醫不覺失笑曰若是則先生真見隔垣矣吁嗟下士聞道固若此乎訂方用六君子湯煎調赤石脂末其醫不解豈知吾意中因其膜囊既空而以是填之俾不為異日患乎吾昔治廣陵一血蠱服藥百日後大腹全消左脅肋始露病根一長條如小枕狀以法激之嘔出黑汙鬥許余從大便泄去始消每思蠱脹不論氣血水痰總必自闢一宇如寇賊蟠據必依山傍險方可久聚內經論五臟之積皆有定所何獨於六腑之聚久為患如鼓脹等類者遂謂漫無根柢區界乎是亦可補病機之未逮附窠囊證據許叔微本事方曰微患飲澼三十年始因少年夜坐寫文左向伏几是以飲食多墜左邊中夜必飲酒數杯又向左臥壯時不覺三五年後覺酒止從左下有聲脅痛食減嘈雜飲酒半盞即止十數日必嘔酸水數升暑月止右邊有汗左邊絶無遍訪名醫及海上方間或中病止得月餘復作其補如天雄附子礬石利如牽牛大戟甘遂備嘗之矣自揣必有澼囊如水之有科臼不盈科不行但清者自行而濁者停滯無路以決之故積至五七日必嘔而去脾土惡濕而水則流濕莫若燥脾以去濕崇土以填科臼乃製蒼朮丸服三月而疾除繇此觀之痰飲小患尚有科臼豈脹滿大病反無科臼乎但許公酸水積至數升必盡嘔去故不下滲於腹若聖符則積之經年腹中已容數斗喉間連谷上湧者不過數口而已向非吾先治胃中酸水腹內再可加一年之積乎然腹中之事言之反涉於誕其不以為功也宜矣昔賢自病三十年始悟今之醫輩視人猶己者有幾況己病亦不如所繇耶其更數醫而不能為善後計者總之未透此關耳胡卣臣先生曰認病機處溯流窮源若河漢莫可紀極然實鑿鑿有據不涉影響覺十年讀書三次折肱者未必具此手眼論吳叔寶無病而得死脈吳叔寶先生因治長公聖符之暇日無病索為立案豈求隔垣早見而撤土先防乎僕未悉翁平素之脈因嘗藥而吐瀉交作始為診之見脈躁而不靜徑而不柔疑所傷甚大乃翁漫不介意無非恃體之堅固耳及具道平昔始知稟受元陽甚旺從前所患皆為熱中之病蓋膏粱厚味之熱陽氣載以俱升勢必發為癰疽疔毒及膿潰鬥許毒盡而陽不乏夫非得於天者厚耶然屢費不資久從暗耗況人身候轉不常始傳熱中今傳寒中矣熱中則一身之痰俱變為熱痰熱則走故發為瘡瘍寒中則一身之痰俱變為寒痰寒則凝故結塞於胸膈不易開散一繇陽氣高亢一繇陽氣卑微耳今見脈中或三至一轉或五至一轉不與指相值自為區別雖名三五不調其實陽氣孤危已甚翁弗病則已萬一病出必非紓徐迂緩試即以冬時為譬寒威凜冽陰霾晝見天日無光或有之矣能無慮乎據所稟之厚宜百年有常乃今亦覺少衰扶身藥餌有斷不可缺者服藥而脈返其馴緝續罔間尚可臻古稀之列蓋所稟之豐如有國者祖功宗德之隆即當衰季復有中興一段光彩耳翁見案不懌至冬月果患胸腹緊痛脹悶不堪以滾酒熱鹽內澆外尉不止服附子理中十數劑始安次年四月臨喪過哀嘔血升余服潤滯藥過多飲食入胃先痛後嘔大便黏滯而不堅燥欲成痰膈在郡更醫十餘手雜投罔效歸用土醫服觀音對坐草而胃氣搜削殆盡最後飲水惡熱乃胃中久失谷養津液盡枯一團真火內熾凡病此症者無不皆然醫者不審痰膈與熱膈異治尚以牛黃狗寶漫圖僥幸僕以未病先識不敢染指投劑亦繇時輩媚嫉欲借翁病為刀俎地先以去年所用之藥為謗端是以即有旋覆代赭成法可施承當不下耳可勝悼哉胡卣臣先生曰輿謗易興易息出於公耳獨熏箎中之鬼域造端微而貽禍遠可慨可慨附與門人論飲滾酒過多成膈症之故過飲滾酒多成膈症人皆知之而所以然之理不達也蓋膈有二種一者上脘之艱於納一者下脘之艱於出耳然入之胃中全是一團沖和之氣所以上脘清陽居多不覺其熱下脘濁陰居多不覺其寒即時令大熱而胃中之氣不變為熱時令大寒而胃中之氣不變為寒氣惟沖和故但能容食不能化食必藉脾中之陽氣入胃而運化之機始顯此身中自然之造化也曲糵之性極能升騰日飲沸酒不輟勢必將下脘之氣轉升於中上二脘而幽門之口閉而不通者有之且滾酒從喉而入日將上脘炮灼漸有腐熟之象而生氣不存窄隘有加止能咽水不能納穀者有之此其所以多成膈證也若夫熱藥之性其傷人也必僭以火曰炎上也寒藥之性其傷人也必濫以水曰潤下也不僭不濫而獨傷中焦沖和之氣者必無之理設果服附子能成膈患去年勸勿飲熱酒時何不蚤言而治錢州尊失血大劑倍用又何自戾耶赤土不容硃砂巧於用譖此方之不我谷者豈偶哉面論大司馬王岵翁公祖耳鳴用方大意人身有九竅陽竅七眼耳鼻口是也陰竅二前後二陰是也陽氣走上竅而下入於陰位則有溺泄腹鳴之候陰氣走下竅而上入於陽位則有窒塞耳鳴之候故人當五十以外腎氣漸衰於下每每從陽上逆而腎之竅開於耳耳之聰司於腎腎主閉藏不欲外泄因肝木為子疏泄母氣而散於外是以謀慮鬱怒之火一動陰氣從之上逆耳竅窒塞不清故能聽之近不礙而聽遠不無少礙高年之體大率類然然較之聾病一天一淵聾病者其竅中另有一膜遮蔽外氣不得內入故以開竅為主而方書所用石菖蒲麝香等藥及外填內攻等法者皆為此而設至於高年陰氣不自收攝越出上竅此理從無一人會及反以治少壯耳聾藥及發表散氣藥兼帶陰虛為治是以百無一效不知陰氣至上竅亦隔一膜不能越出竅外止於竅中汩汩有聲如蛙鼓蚊鑼鼓吹不已以故外入之聲為其內聲所混聽之不清若氣稍不逆上則聽稍清氣全不逆上則聽全清矣不肖悟明此理凡治高年逆上之氣屢有奇效方中大意全以磁石為主以其重能達下性主下吸又能制肝木之上吸故也而用地黃龜膠群陰之藥輔之更用五味子山茱萸之酸以收之令陰氣自旺於本宮不上觸於陽竅繇是空曠無礙耳之於聲似谷之受響萬籟之音尚可細聆豈更與人聲相拒艱於遠聽耶此實至理所在但醫術淺薄之輩不能知之試觀人之收視而視愈明返聽而聽愈聰者然後知昌之斯言非臆說也謹論附答岵翁公祖書捧讀祖臺鈞論耳中根原甚悉且考究方書揣察仲景即深於醫旨者不能道隻字不肖昌竦然於金石之音從茲倍加深入矣慶幸慶幸昨方論中明知左耳有一膜遮蔽姑置未論但論右耳所以時清時混之故在於陰氣上觸耳蓋人兩腎之竅雖開於耳而腎氣上入耳際亦為隔膜所蔽不能越於耳外止於耳根下少則微鳴多則大鳴甚且將縈耳之筋觸之跳動直似撞穿耳輪之象者然實必不可出也設陰氣能出耳外而走陽竅則陰陽相混非三才之理矣故耳之用妙在虛而能受也外入之氣隨大隨小至耳無礙惟內觸之氣咶咶有聲所以外入之氣僅通其半若鬱怒之火動內氣轉增則外入之氣轉混必內氣漸走下竅上竅復其虛而能受之體然後清清朗朗聲入即通無壅礙也方書指為少陽膽厥陰肝二經熱多所致是說左耳分部然少陽之氣能走上竅其穴皆絡於腦巔無觸筋中耳之理不當與厥陰混同立說其通聖散一方汗下兼用乃治壯火之法丹溪所取亦無確見惟滾痰丸一方少壯用之多有效者則以大黃黃芩沉香之苦最能下氣而礞石之重墮大約與磁石之用相仿也不肖昌所以不用此方者以其大損脾胃且耗胸中氤氳之氣耳至於腎虛耳鳴指作胱膀相火上升則陽火必能透出上竅不為鳴也尤見丹溪無據之談易言水中有火原說真火故坎中之一點真陽即真火也年高之人腎水已竭真火易露故腎中之氣易出難收況有厥陰之水為之挹取乎然則壯水之主以制陽光如盞中添油而燈焰自小誠為良治乃云作陰虛治不效者知其泛論世人不為老人立法也夫收攝腎氣原為老人之先務豈丹溪明哲而為此等議論乎不肖昌昨方論中欲返祖臺右耳十餘年之聰以仰答帝鑑慰藉蒼生耳非為左耳數十年之錮論也草野不恭統惟亮宥謹復胡卣臣先生曰耳鳴之故從來無人說透此案方大開法門直敘王岵翁公祖病中垂危復安始末岵翁公祖自春月論耳鳴後見昌執理不阿知為可用至冬初以脾約便艱再召診視進蓯蓉胡麻山藥首烏等四劑即潤蓋緣腸中少血多風與藥適宜故效敏耳自是益加信悅時沐枉駕就問披衷相示冬盡偶因飽食當風忽然一吐傾囊而出胃氣大傷隨召診間體中微似發熱左關之脈甚大自云始先中脘不舒今覺氣反攻左始用梨汁不投今用蔗漿稍定不知此何症也昌因斷曰此虛風之候也以胃中所受之水穀出盡無留空虛若谷而風自內生兼腸中久蓄之風乘機上入是以胃中不安然風入於胃必左投肝木而從其類是以氣反攻左而左脈即為之大且徑內經云風淫於內治以甘寒梨汁蔗漿俱甘寒對症之物而一效一不效者又可知胃中氣虛已極不耐梨性之達下而喜蔗性之和中也於是以甘寒一派之藥定方人參竹瀝麥門冬生地黃之屬衆議除參不用服後腹中呱呱有聲嘔出黃痰少許胸中遂快次早大便亦通症似向安然有可怪者本是胃經受病而胃脈反不見其病只是上下兩旁心腎肝肺之脈時時另起一頭不安其常因為剖心爭論謂此非上下兩旁之見病端也乃中央氣弱不能四迄如母病而四子失乳故現飢餒之象耳觀公祖自云口中之味極淡又云水到喉管即注住不肯下行明明是胃中之氣不轉宿水留住喉間不能更吞新水耳宜急用四君子湯以理胃氣則中央之樞軸轉而四畔之機關盡利喉管之水氣不逆而口中之淡味亦除矣如不見信速請明者商之不便在此羈時誤事也然而言過激烈反怪為故意驚駭改召二醫有謂中風者有謂傷寒者見各不同至於人參之不可用則同聲和之謂症之輕而易療則同力擔之微用發表之藥即汗出沾濡又同口贊之曾不顧已竭之胃氣追之實難反開關而縱之去於是氣高神蕩厄逆不休矣再僥幸而投黃連一劑將絶之系加極苦以速其絶二醫措手不及復召昌至則脈已大亂如沸如羹頻轉頻歇神昏不醒身強莫移年壽間一團黑滯其氣出則順而入必噦通計晝夜一萬三千五百息即得一萬三千五百噦矣二醫卸禍謂昌前所議四君子湯今始可用吁嗟呼吸存亡尚圖雍容樽俎乎據理答之曰氣已出而不入再加參朮之膩阻立斷矣惟有仲景旋覆代赭石一方可收神功於百一進一劑而噦勢稍減二劑加代赭石至五錢噦遂大減連連進粥神清色亮脈復體輕再用參苓麥冬木瓜甘草平調二日遂康復如初此蓋祖翁少時純朴不凋故松柏之姿老而彌徑非盡藥之功能也即論藥亦非參之力乃代赭墜參下行之力也祖翁病劇問昌何為不至及病間見昌進藥即鼓勇欣嘗抑何見知之深耶而昌亦得藉湯藥以行菽水之事快矣快矣胡卣臣先生曰左氏春秋無與於兵而名將以為兵法之至精見理不到則一心之運用不出也噫難與俗人言直推王岵翁公祖病後再誤貽患岵翁公祖深知醫理投劑咸中肯綮所以長年久世然苦耳鳴不樂對客其左右侍從誰能究心醫藥之事前病獲安競以為人參之力而卸禍者反得居功謂其意原欲用參但不敢專主姑進不肖商榷以示詳慎耳於是善後之宜一以諉之曾不顧夫一誤再誤也吁嗟善後之圖維果易謀乎哉前所論虛風一症昌才用甘寒藥一劑稍效俄焉更醫誤以傷寒為治而致危殆昌雖用旋覆代赭二劑回天然前此虛風本症尚無暇於驅除而主家及醫其時方競夸人參之力謂調理更宜倍用無俟參酌曾不思虛風醞釀日深他日再求良治不能及矣此際欲造庭力爭是謂生端即上書陳說又恐中格惟有撫膺展轉太息而已吁嗟時事之不可為大都若此矣然雖不得借箸前籌未可不列眉而論也內經云風者善行而數變言風之為病無定體也又曰病成而變此則專言胃風所傳之病變症最多也變症有五一曰風成為寒熱以風氣通肝則木盛而侮脾胃故生寒熱也祖翁前病時左關之脈獨大自雲氣反攻左而每多寒熱之候致醫輩視為外感者是其徵也一曰厥成為巔疾厥者逆也謂胃氣逆而上升成巔頂之疾如眩暈之類也祖翁前病時厄逆不休時覺昏暈者是其徵也一曰疸成為消中疸者熱也熱積胃中善食而易飢火之害也祖翁胃中素有積熱而多欲得食者是其徵也一曰久風為飧泄言胃中風熾飧已即泄不留停也祖翁平素三四日始一大便今嘗無故泄下數行是其徵也一曰脈風成為癘言胃中之風醞釀既久則榮氣腐而不清肌肉之間漸至潰爛以胃主肌肉也祖翁四末及脈道之間慣生瘡瘍浸淫為害者是其徵也此五者總為胃風之病祖翁俱已見端又喜飧羊肉河豚以召致之然亦不自繇也蓋風煽胃中如轉丸之捷食入易消不得不借資於厚味而不知胃中元氣久從暗耗設虛風止熄即清薄之味尚不易化況於肥甘乎今之醫者全不究病前病後消息明明語以虛風之證竟不知虛風為何物奈何言醫耶奈何言調攝耶昌於此殆不勝古今家國之感矣案雖定而狂瞽之言未便呈覽兼值昌有浙遊旋日祖翁復得重恙召診時語昌云一病幾危今幸稍可但徹夜撰改本章不輟神亂奈何昌對曰胃風久熾津液乾枯真火內燔宜用知母一兩人參甘草各一錢日進二劑自安衆議方中用參太少且無補藥佐之全無取義竟置不用連進參朮大劑不效越三日劑中人參竟加一兩服後頃刻氣高不返而仙逝八旬元老勳勒鼎彝子姓森森繞榻三匝夫復何憾獨昌親承棫朴之化於報稱之心有所未慊也哀哉直敘立刻救蘇劉筠枝不終其用之故筠枝先生創業維艱大率得之節嗇者多然七旬御女不輟此先天元陽固密非人力之所為也若能良賈深藏可以百年用之不竭奈何以御女之故而數擾其陽耶夫陽者親上而衛外易出而難收者也在根基淺露之軀毫不敢肆情縱欲幸而根深蒂固不易動搖乃以房中之術自伐其根而重加栽接致大命危於頃刻豈誤以節嗇之方而倒施之御女乎夏月陽氣在外陰氣在內此時調攝之藥全以扶陽抑陰為主翁偶不快於飲食起居如常醫者以壯年傷暑之藥香薷黃柏石膏知母滑石車前木通投之即刻不支臥於床褥次早余見時則身僵頸硬舌強喉啞無生理矣余診畢云此證雖危然因誤藥所致甫隔一晚尚可以藥速追急以大附子乾薑人參白朮各五錢甘草三錢大劑煎服可解此厄萬不宜遲渠諸子不能決余忙取藥自煎衆議姑以前方煎四分之一服之安貼再煎未遲只得從之藥成送進適前醫再至遂入診良久阻藥不用余面辱其醫進房親督灌藥寸香之久翁大嘔一聲醒而能言但聲雌而顫呼諸子乳名云適才見州官回詢其所繇開目視之不語轉問醫者何人曰江西喻遂抬手一拱又云被縫有風來塞塞余甚快忙出煎所存三分之藥以再進維時姻族雜至商以肩輿送余歸寓余斷欲進藥衆勸云且暫回寓或者明日再請其意中必懼吾之面折醫輩耳及他醫進藥啞瞶如前越二日而逝余為之嘆惜不已焉七旬御女不輟斧斤於內而假庸醫以權長子次子繼夭斧斤於外而開姻族以釁氣機久動尚自謂百年無患也於人乎何尤胡卣臣先生曰獻玉而遭刖認為頑石也投珠而按劍詫為不祥也至剖石得玉轉災為祥尚然不識則何見耶醫事固裂亦所遇適窮耳論徐嶽生將成痿痹之證徐嶽生軀盛氣充昔年因食指微傷見血以冷水濯之遂至血凝不散腫潰出膿血數升小筋脫出三節指廢不伸邇來兩足間才至秋月便覺畏冷重綿蔽之外拊仍熱內揣獨覺其寒近日從踵至膝後筋痛不便遠行云間老醫令服八味丸深中其意及僕診自云平素脈難摸索乃肝肺二部反見洪大大為病進況在冬月木落金寒時尤為不宜方來之勢將有不可向邇者八味丸之桂附未可輕服也何也筋者肝之合也附筋之血既經食指之挹取存留無幾不能榮養筋脈加以忿怒數動肝火傳熱於筋足跗之大筋得熱而短是以牽強不便於行也然肝之所主者惟肺木性畏金稟令擁戴若君主然故必肺氣先清周身氣乃下行今肺脈大則肺氣又為心主所傷壅窒不清是以陽氣不能下達而足寒也然則所患雖微已犯三逆平素脈細而今脈大一逆也肝脈大而熱下傳二逆也肺脈大而氣上壅三逆也設誤以桂附治之熱者愈熱壅者愈壅即日便成痿痹矣此際用藥淵乎微乎有尋常不能測識者蓋筋脈短徑肝氣內錮須亟講於金伐木榮之道以金伐木而木反榮筋反舒匪深通玄造者其孰能知之然非金氣自壅則木且奉令不暇何敢內拒惟金失其剛轉而為柔是以木失其柔轉而為剛故治此患先以清金為第一義也然清金又先以清胃為第一義不清其胃則飲酒焉而熱氣輸於肺矣厚味焉而濁氣輸於肺矣藥力幾何能勝清金之任哉金不清如大敵在前主將懦弱已不能望其成功況舍清金而更加以助火爍金倒行逆施以為治耶必不得之數矣翁見藥石之言漫無忌諱反疑為張大其說而莫之信竟服八味丸一月後痿痹之情悉著不幸所言果驗乃臥床一載必不令僕一見聞最後陽道盡縮小水全無乃肺金之氣先絶於上所以致此明明言之而竟蹈之奈何奈何胡卣臣先生曰此治痿痹證之妙法蓮華經也不當作文字褻視論江沖寰先生足患治法庚辰冬於鼎翁公祖園中識先生半面竊見身體重著履步艱難面色滯晦語言遲緩以為有虛風卒中之候也因為過慮辛巳秋召診間細察脾脈緩急不調肺脈徑大然肝木尚平陽氣尚旺是八風之邪未可易中而筋脈掣痛不能安寢者大率風而加之以濕交煽其虐所致以斯知尚可引年而施治也何也風者肝之病天之氣也濕者脾之病地之氣也天氣迅疾故發之暴益以地氣之迂緩反有所牽制而不能暴矣然氣別則病殊而氣交則病合有不可不明辨者病殊者在天氣則風為百病之長其來微則隨相剋為傳次必遍五臟而始烈其來甚則不繇傳次而直中唯體虛之人患始不測焉在地氣則濕為下體之患其來微則足跗腫大然得所勝亦旋消其來甚則害及皮肉筋脈以漸而上攻亦唯陽虛之人勢始騰越焉兩者一本之天一本之地病各懸殊治亦異法者也病合者天之氣入於筋脈地之氣亦入於筋脈時乎天氣勝則筋脈張而徑焉時乎地氣勝則筋脈軃而緩焉兩者其源雖異其流則同交相蘊結蔓而難圖者也先生房中之風始雖不可知然而所感則微也至若濕之一字既以醇酒厚味而釀之於內又為炎蒸嵐瘴而襲之於外是以足患日熾雖周身筋脈舒展亦不自如究竟不若足間晝夜掣痛瘡瘍腫潰浸淫無已也夫春時之風也夏時之濕與熱也秋時之燥也三時之氣皆為先生一身之患者也而一身之患又惟一隅獨當之亦良苦矣設內之風濕熱燥不攘足患其有寧宇乎所可嘉者惟冬月寒水司令勢稍末減而醫者不識此意每投壯筋骨之藥酒以驅其濕不知此乃治寒濕之法惟冬月病增者方宜豈以風濕熱濕而倒行逆施寧不重其困耶況乎先生肺脈徑大三四日始一大便雖冬月亦喜形寒飲冷而不欲近火何所見其為寒濕也哉所以孫真人大小竹瀝等方風濕熱燥寒五治之藥俱備籠統龐雜後人全不知用若識此義為去取則神而明之之事矣然則不辨證而用方者幾何而不誤耶胡卣臣先生曰辨證縱橫無礙劍光燁燁逼人論錢太封翁足患不宜用熱藥再誤錢叔翁太老先生形體清瘦平素多火少痰邇年內蘊之熱蒸濕為痰辛巳夏秋間濕熱交勝時忽患右足麻木冷如冰石蓋熱極似寒如暑月反雨冰雹之類醫者以其足跗之冷也不細察其為熱極似寒誤以牛膝木瓜防己加皮羌獨之屬溫之甚且認為下元虛憊誤用附桂河車之屬補之以火濟火以熱益熱由是腫潰出膿水浸淫數月踝骨以下足背指踵廢而不用總為誤治而至此極耳其理甚明無難於辨若果寒痰下墜不過堅凝不散止耳甚者不過痿痹不仁止耳何至腫而且潰黃水淋漓腐肉穿筋耶太翁不知為醫藥所誤乃委咎於方隅神煞所致豈其然哉此與傷寒壞證熱邪深入經絡而為流注無少異也所用參膏但可顓理元氣而無清解濕熱之藥以佐之是以未顯厥效以元老之官不可以理煩劇設與竹瀝同事人參固其經竹瀝通其絡則甘寒氣味相得益彰矣徐太掖先生服人參以治虛風誤佐以附子之熱迄今筋脈短縮不便行持亦繇不識甘寒可通經絡也且太翁用參膏後脾氣亦既大旺健運有加矣此時倘能撙節飲食俾脾中所生之陽氣得顓力以驅痰驅熱則痰熱不留行而足患並可結局乃日食而外加以夜食雖脾氣之旺不為食所傷然以參力所生之脾氣不用之運痰運熱止用之以運食誠可惜也今者食入亦不易運以助長而反得衰乃至痰飲膠結於胸中為飽為悶為頻咳而痰不應總為脾失其健不為胃行津液而飲食反以生痰漸漬充滿肺竅咳不易出雖以治痰為急然治痰之藥大率耗氣動虛恐痰未出而風先入也唯是確以甘寒之藥杜風消熱潤燥補虛豁痰乃為合法至於辛熱之藥斷斷不可再誤矣醫者明明見此輒用桂附無算想必因膿水易干認為辛熱之功而極力以催之結局耳可勝誅哉胡卣臣先生曰濕熱傷足自上而下也足寒傷心自下而上也自上下者先清其上自下上者先溫其下觀此而民病傷國可知治先在民矣論浦君藝喘病證治之法人身難治之病有百證喘病其最也喘病無不本之於肺然隨所傷而互關漸以造於其極惟兼三陰之證者為最劇三陰者少陰腎太陰脾厥陰肝也而三陰又以少陰腎為最劇經云腎病者善脹尻以代踵脊以代頭此喘病兼腎病之形也又云勞風發在肺下巨陽引精者三日中年者五日不精者七日當咳出青黃濃濁之痰如彈子大者不出者傷肺傷肺者死也此喘病兼腎病之情也故有此證者首重在節欲收攝腎氣不使上攻可也其次則太陰脾厥陰肝之兼證亦重勿以飲食忿怒之故重傷肝脾可也若君藝之喘證得之於髫幼非有忿欲之傷止是形寒飲冷傷其肺耳然從幼慣生瘡癤瘡癤之後復生牙癰脾中之濕熱素多胃中之壯火素盛是肺經所以受傷之原又不止於形寒飲冷也脾之濕熱胃之壯火交煽而互蒸結為濁痰溢入上竅久久不散透開肺膜結為窠囊清氣入之渾然不覺濁氣入之頃刻與濁痰狼狽相依合為黨援窒塞關隘不容呼吸出入而呼吸正氣轉觸其痰鼾齁有聲頭重耳響胸背骨間有如刀刺涎涕交作鼻頞酸辛若傷風狀正內經所謂心肺有病而呼吸為之不利也必俟肺中所受之濁氣解散下行從前後二陰而去然後肺中之濃痰咯之始得易出而漸可相安及夫濁氣復上則窠囊之痰復動窒塞仍前復舉乃至寒之亦發熱之亦發傷酒傷食亦發動怒動氣亦發所以然者總繇動其濁氣耳濁氣本居下體不易犯入清道每隨火勢而上騰所謂火動則氣升者濁氣升也腎火動則寒氣升脾火動則濕氣升肝火動則風氣升也故以治火為先也然濁氣既隨火而升亦可隨火而降乃凝神入氣以靜調之火降而氣不降者何耶則以濁氣雖居於下而肺中之窠囊實其新造之區可以僑寓其中轉使清氣逼處不安亦若為亂者然如寇賊依山傍險蟠據一方此方之民勢必擾亂而從寇也故雖以治火為先然治火而不治痰無益也治痰而不治窠囊之痰雖治與不治等也治痰之法曰驅曰導曰滌曰化曰湧曰理脾曰降火曰行氣前人之法不為不詳至於窠囊之痰如蜂子之穴於房中如蓮子之嵌於蓬內生長則易剝落則難繇其外窄中寬任行驅導滌湧之藥徒傷他臟此實閉拒而不納耳究而言之豈但窠囊之中痰不易除即肺葉之外膜原之間頑痰膠結多年如樹之有蘿如屋之有遊如石之有苔附托相安倉卒有難於剗伐者古今之為醫者夥矣從無有為此渺論者僕生平治此症最多皆以活法而奏全績蓋肺中濁痰為祟若牛渚怪物莫逃吾燃犀之照者因是曠觀病機異哉肺金以脾土為母而肺中之濁痰亦以脾中之濕為母脾性本喜燥惡濕逮夫濕熱久錮遂至化剛為柔居間用事飲食入胃既以精華輸我周身又以敗濁填彼竅隧始尚交相為養最後挹彼注此顓為外邪示豈弟致使憑城憑社輩得以久遂其奸如附近流寇之地益以巨家大族暗為輸導其滋蔓難圖也有繇然矣治法必靜以馭氣使三陰之火不上升以默杜外援又必嚴以馭脾使太陰之權有獨伸而不假敵愾我實彼虛我堅彼瑕批瑕搗虛迅不掩耳不崇朝而掃清穢濁乃廣服大藥以安和五臟培養肺氣肺金之氣一清則周身之氣翕然從之下降前此上升濁邪允絶其源百年之間常保清明在躬矣此蓋行所當然不得不然之法夫豈塗飾聽聞之贅詞耶君藝敦請顓治果獲全瘳益見僕言非謬矣胡卣臣先生曰岐黃論道以後從不見有此精細快徹之談應是醫門靈寶又曰君藝童年錮疾非所易瘳今疾愈而且得子矣先議後藥功不偉耶論吳吉長乃室及王氏婦誤藥之治驗吉長乃室新秋病灑淅惡寒寒已發熱漸生咳嗽然病未甚也服表散藥不愈體日瘦羸延至初冬飲以參朮補劑轉覺厭厭欲絶食飲不思有咳無聲瀉利不止危在旦暮醫者議以人參五錢附子三錢加入薑桂白朮之屬作一劑服以止瀉補虛而收背水之捷吉長倣徨無措延僕診畢未及交語前醫自外亟至見僕在坐即令疏方僕飄然而出蓋以渠見既訛難與語至理耳吉長辭去前醫堅請用藥僕因謂曰是病總繇誤藥所致始先皮毛間灑淅惡寒發熱肺金為時令之燥所傷也用表散已為非法至用參朮補之則肺氣閉錮而咳嗽之聲不揚胸腹飽脹不思食飲肺中之熱無處可宣急奔大腸食入則不待運化而直出食不入則腸中之垢汙亦隨氣奔而出是以瀉利無休也今以潤肺之藥兼潤其腸則源流俱清寒熱咳嗽泄瀉一齊俱止矣但取藥四劑服之必安不足慮也方用黃芩地骨皮甘草杏仁阿膠初進一劑瀉即少止四劑畢而寒熱俱除再數劑而咳嗽俱全愈矣設當日與時輩商之彼方執參附為是能從我乎又鄉中王氏婦秋月亦病寒熱服參朮後亦厭厭一息但無咳嗽十餘日不進粒米亦無大便時時暈去不省人事其夫來寓中詳述其症求發補劑歸服余以大黃芒硝石膏甘草四味為粗末與之彼不能辨歸而煎服其妻云此藥甚咸夫喜曰咸果補藥遂將二劑連服頃之腹中努痛下結糞數塊絶而復蘇進粥二盞前病已如失矣鄉人致謝忱始知之凡此素有定見於中故不為臨歧所炫也姑存是案為治病者廣其識焉胡卣臣先生曰毫釐有差千里懸絶案中治法似乎與症相反究竟不爽大難大難辨鼎翁公祖頤養天和宜用之藥舊憲治公祖江鼎寰先生望七之齡精神健旺脈氣堅實聲音洪亮晉接不厭其繁紛絲尚能兼理不羡洛社耆英行見熙朝元老矣偶有胸膈弗爽肺氣不清鼻多濁涕小恙召診日兼患齒痛謹饋以天冬熟地石棗丹皮枸杞五味等收攝腎氣藥四劑入桂些少為引經服之齒痛頓止鼻氣亦清第因喉中作干未肯多服門下醫者素逢主見治標熱不治本虛特為辨曰祖翁所稟先天陽氣甚厚冬月尚仍早興晚寢飲蔗啖梨是以服藥多喜清畏補然補有陰陽之不同陽氣雖旺於上陰氣未必旺於下髭鬢則黑步履則遲其一徵也運臂則輕舉腰則重其一徵也陽道易興精液難固其一徵也胃能多受腸弗久留其一徵也下本不虛下之精華暗輸於上是以虛也上本不實清陽之分為陰所湊似乎實也故陰湊於上而開竅於目則為淚開竅於鼻則為涕開竅於口則為涎為唾經云五十始衰謂陰氣至是始衰也陰氣衰故不能自主而從陽上行其屑越者皆身中之至寶向非收攝歸元將何底極是以事親養老諸方皆以溫補下元為務誠有見於老少不同治少年人惟恐有火高年人惟恐無火無火則運化艱而易衰有火則精神健而難老有火者老人性命之根未可以水輕折也昔賢治喉干謂八味丸為聖藥譬之釜底加薪則釜中津氣上騰理則然矣可見下虛者不但真陰虛究竟真陽亦虛何也陽氣以潛藏為貴潛則弗亢潛則可久易道也盞中加油則燈愈明爐中覆灰則火不熄與其孤陽上浮為熱曷若一併收歸於下則鼻中之濁涕不作口中之清液常生雖日進桂附尚不覺其為熱矧清利潤下之劑而反致疑乎是為辨胡卣臣先生曰吾鄉諸老享有遐齡者最多鼎寰廉訪年來絶欲忘機怡情悅性大藥不藉草木之偏上壽更無涯涘可測此案第借為高年立法理自不誣論張受先先生漏證善後之宜舊鄰治父母張受先先生久患穿腸痔漏氣血大為所耗有薦吾鄉黃先生善敷割者先生神其術一切內治之藥並取決焉不肖昌雅重先生文章道德之身居瀛海時曾令門下往候脈息私商善後之策大意謂先生久困漏卮一旦平成精氣內榮自可百年無患然新造之區尚未堅固則有浸淫之虞臟氣久虛腸蓄易澼則有轉注之虞清氣久陷既服甘溫升舉矣然漏下已多陰血暗耗恐毗於陽水穀易混既用養臟厚腸矣然潤劑過多脾氣易溜恐毗於陰且漏孔原通精孔精稍溢出勢必旁滲則豢精當如豢虎厚味最足濡脾味稍不節勢必走泄則生陰無取傷陰蓋人身脾氣每喜燥而惡濕先生漏孔已完敗濁下行者無路可出必轉滲於脾濕固倍之是宜補脾之陽勿傷脾之陰以復健運之常而收和平之益云云及至婁中應召往診指下輕取鼓動有力重按若覺微細是陽未見不足陰則大傷矣先生每進補陰之藥則夜臥甚寧腸澼亦稀以故瘍醫妄引槐角地榆治腸風下血之法治之亦不覺其誤其實漏病乃精竅之病蓋媾精時氣留則精止氣動則精泄大凡強力入房者氣每沖激而出故精隨之橫決四射不盡繇孔道而注精溢於精管之外久久漸成漏管今漏管雖去而肉中之空隙則存填竅補隧非此等藥力所能勝也不肖姑不言其非但於其方中去槐角地榆等而加鹿角霜一味所謂惟有斑龍頂上珠能補玉堂關下缺者是也況群陰之藥最能潤下不有以砥之則腸中之水更澼聚可虞耶然此特微露一斑耳瘍醫不解已阻為不可用因思吾鄉一治漏者潰管生肌外更有二神方先以丸藥半斤服之令人陽道驟痿俟管中肉滿管外緻密後以丸藥半斤服之令人陽道復興雖宜於少未必宜於老然用意亦大奇矣不肖才欲填滿竅隧而黃生阻之豈未聞此人此法乎胡卣臣先生曰漏管果通精竅敷治易而填補難案中所說確乎有見詳胡太封翁疝證治法並及運會之理剿寇之事養翀太老先生精神內守百凡悉處謙退年登古稀面貌若童子蓋得於天全而不受人損也從來但苦脾氣不旺食飲厚自撙節邇年少腹有疝形如雞卵數發以後其形漸大而長從少腹墜入睪囊甚易返位甚難下體稍受微寒則發發時必俟塊中冷氣漸轉暖熱始得軟溜而縮入不然則鼓張於隘口不能入也近來其塊益大發時如臥酒瓶於胯上半在少腹半在睪囊其勢堅緊如石其氣迸入前後腰臍各道筋中同時俱脹繇是上攻入胃大嘔大吐繇是上攻巔頂戰栗畏寒安危止關呼吸去冬偶見暴發光景知為地氣上攻亟以大劑參附薑桂投之一劑而愈以後但遇舉發悉用桂附速效今五月末旬值昌他往其證連日為纍服十全大補湯二十餘劑其效甚遲然疑證重不疑藥輕也值年家俞老先生督餉浙中遙議此證亦謂十全大補用到百劑自效乃決意服至仲秋其證復發發時昌仍用薑桂參附投之令郎諫議卣翁老先生兩疑而莫所從也昌請深言其理焉夫人陽不足則用四君陰不足則用四物陰陽兩不足則合四君四物而加味為十全大補此中正和平之道也若夫濁陰之氣結聚少腹而成有形則陰盛極矣安得以陰虛之法治之助邪而滋疾乎何以言之婦女有娠者之病傷寒不得已而用麻桂硝黃等傷胎之藥但加入四物則厲藥即不能入胞而傷胎豈欲除塊中之邪反可用四物護之乎此一徵也凡生癥瘕痞塊者馴至身羸血枯百計除之不減一用四物則其勢立增夫四物不能生血活血而徒以增患此又一徵也人身之血脈全賴飲食為充長四物之滯脾原非男子所貴既以濁陰極盛時至橫引陰筋直衝陽絡則地氣之上陵者大有可慮何得以半陰半陽之藥蔓而圖之四物之不當用無疑矣即四君亦元老之官不可以理繁治劇必加以薑桂附子之猛始克勝病何也陰邪為害不發則已其發必暴試觀天氣下降則清明地氣上升則晦塞而人身大略可睹然人但見地氣之靜而未見地氣之動也方書但言陰氣之衰而未言陰邪之盛也醫者每遇直中陰經之病尚不知所措手況雜證乎請縱談天地之道以明之天地之道元會運世一書論之精矣至於戌亥所以混茫之理則置之不講以為其時天與地混而為一無可講耳殊不知天不混於地而地則混於天也蓋地氣小動尚有山崩川沸陵遷谷變之應況於地氣大動其雷炮迅擊之威百千萬億遍震虛空橫衝逆撞以上加於天寧不至混天為一耶必至子而天開地氣稍下而高覆之體始露也必至醜而地闢地氣始返於地而太空之體始廓也其時人物尚不能生者則以地氣自天而下未至淨盡其青黃紅紫赤白碧之九氣而外更有諸多悍疾之氣從空注下者動輒綿亙千百丈如木石之直墜如箭弩之橫流人物非不萌生其中但為諸多暴氣所摧殘而不能長育耳必至寅而駁劣之氣悉返沖和然後人物得遂其生以漸趨於繁衍耳陰氣之慘酷暴烈一至於此千古無人論及何從知之耶大藏經中佛說世界成毀至詳而無此等論說者蓋其已包括於地水火風之內不必更言也夫地水火風有一而非陰邪也哉群陰之邪釀成劫運昌之所謂地氣之混於天者非臆說矣堪輿家尚知趨天干之吉而避地支之凶奈何醫之為道遇地氣上奔之證曾不思避其凶禍耶漢代張仲景特著卒病論十六卷祿山兵火以後遂湮沒不傳後人無繇獲見昌因悟明地氣混天之理凡見陰邪上衝孤陽擾亂之證陡進純陽之藥急驅陰氣呱呱有聲從大孔而出以闢乾坤而揭日月功效亦既彰彰如太翁之證屢用姜附奏績者毋謂一時之權宜實乃萬世經常之法也但悍烈之性似非居恆所宜服即舉發時服之未免有口乾舌苦之過其不敢輕用者孰不知之而不如不得不用也即如兵者毒天下之物而善用之則民從不善用之則民叛今討寇之師監而又監制而又制強悍之氣化而為軟戾不得不與寇為和同至於所過之地搶劫一空荊棘生而凶年兆盡驅良民而為寇矣廟堂之上罷兵不能用兵無策大略類然昌請與醫藥之法互相籌酌夫堅塊遠在少腹漫無平期而毒藥從喉入胃從胃入腸始得下究舊病未除新病必起矣於此而用治法先以姜附肉桂為小丸曝令乾堅然後以參朮厚為外廓俾喉胃間知有參朮而不知有薑桂附子遞送達於積塊之所猛烈始露庶幾堅者削而窠囊可盡空也今監督之旄充滿行間壯士金錢飽他人腹性命懸他人手其不能辦寇固也而其大病在於兵護監督不以監督護兵所以迄無成功耳誠令我兵四面與寇相當而令監督於附近賊界堅壁清野與土著之民習且耕且戰之法以厚為我兵之外廓則不至於縶騏驥而縛孟賁我兵可以賈勇而前或擊其首尾或搗其中堅或晝息夜奮以亂其烏合而廓清之功自致矣況有監督以護之於外諸凡外入之兵不敢越伍而譁庶幾民不化為寇而寇可返為民耳山澤之癯何知當世然聊舉醫法之一端若有可通者因並及之卣臣先生問曰外廓一說於理甚長何以古法不見用耶答曰古法用此者頗多如用硃砂為衣者取義南方赤色入通於心可以護送諸藥而達於心也如用青黛為衣者取義東方青色入通於肝可以護送諸藥而達於肝也至於攻治惡瘡之藥包入蔥葉之中更嚼蔥厚罨而吞入取其不傷喉膈而直達瘡所也即煎劑亦有此法如用大劑附桂藥煎好再投生黃連二三分一滾即取起俟冷服之則熟者內行下行而生者上行外行自非外廓之意耶仲景治陰證傷寒用整兩附子煎熟而入生豬膽汁幾滴和之可見聖神用藥悉有法度也卣臣先生曰善胡卣臣先生曰家大人德全道備生平無病年六十以冬月觸寒乃有疝疾今更十年每當病發嘔吐畏寒發後即康好如舊今遇嘉言救濟病且漸除日安一日家大人樂未央皆先生賜矣詳辨諫議胡老先生痰飲小恙並答明問卣翁老先生脈盛體堅神采百倍從無病邪敢犯但每早浴面必嘔痰水幾口胸前慣自摩揉乳下宗氣其動應衣若夜睡寧水道清則胸中爽然其候似病非病遍考方書廣詢明醫不得其解昌謂是痰飲結於胸膈小有窠囊緣其氣之壯盛隨聚隨嘔是以痰飲不致為害而膻中之氣因嘔而傷矣夫膻中者與上焦同位胸膈經云上焦如霧言其氣之氤氳如霧也又曰膻中者臣使之官言其能分布胸中之氣而下傳也今以嘔之故而數動其氣則氤氳變為急迫上奔然稍定則仍下布亦不為害也大率痰為標氣為本治標易而治本則難矣非治本之難以往哲從未言其治法而後人不知所治耳昌試論之治氣之源有三一曰肺氣肺氣清則周身之氣肅然下行先生之肺氣則素清也一曰胃氣胃氣和則胸中之氣亦易下行先生之胃氣則素和也一曰膀胱之氣膀胱之氣旺則能吸引胸中之氣下行先生青年善養膀胱之氣則素旺也其膻中之氣亂而即治擾而即恬者賴此三氣暗為輸運是以不覺其纍即謂之無病也可若三氣反干胸膈之人其為緊為脹可勝道哉故未形之病可以不言而屢動之氣不可不亟反於氤氳先生但覺為痰飲所苦晝日常鼓呼吸之氣觸出胸膈之痰而未知痰不可出徒傷氣也蓋夜臥則痰聚於胃晨起自能嘔出日間胃之津液四達臟腑即激之出不出耳然而痰消則氣自順是必以治痰為急而體盛痰不易除又必以健脾為先脾健則新痰不生其宿痰之在窠囊者漸漬於胃而上下分消於是無痰則不嘔不嘔則氣不亂氣不亂則自返於氤氳矣雖然尚有一吃緊關頭當並講也人身胸中空曠如太虛地氣上則為云必天氣降而為雨地氣始收藏不動誠會上焦如霧中焦如漚下焦如瀆之意則知雲行雨施而後溝瀆皆盈水道通決乾坤有一番新景象矣此義首重在膀胱一經經云膀胱者州都之官津液藏焉氣化則能出矣如人之飲酒無算而不醉者皆從膀胱之氣化而出也蓋膻中位於膈內膀胱位於腹內膀胱之氣化則空洞善容而膻中之氣得以下運若膀胱不化則腹已先脹膻中之氣安能下達耶然欲膀胱之氣化其權尤在於葆腎腎以膀胱為府者也腎氣動必先注於膀胱屢動不已膀胱滿脹勢必逆奔於胸膈其窒塞之狀不可名言腎氣不動則收藏愈固膀胱得以清靜無為而膻中之氣注之不盈矣膻中之氣下走既捷則不為牽引所亂而胸中曠若太空昌更曰氣順則痰不留即不治痰而痰自運矣謹論胡卣臣先生問曰痰在膈中去喉不遠每早必痛嘔始出者何耶曰道不同也胸膈之間重重膈膜遮蔽渾無空隙痰從何出所出者胃中之痰耳曰然則膈中之痰不出耶曰安得不出但出之曲耳蓋膻中之氣四布於十二經布於手足六陽經則其氣從喉吻而上出布於手足六陰經則其氣從前後二陰而下出然從下出者無礙從上出者亦必先下注陽明始得上越是以難也曰若是則所論膀胱氣化一段淵乎微矣但吸引之機權從不見於經典豈有所自乎曰內經有巨陽引精之義緣無注解人不能會巨陽者太陽膀胱經也謂膀胱能吸引胸中之氣下行而胸中之脹自消此足證也曰胸中窠囊之說確然無疑不知始於何因結於何處消於何時也曰人身之氣經盛則注於絡絡盛則注於經窠囊之來始於痰聚胃口嘔時數動胃氣胃氣動則半從上出於喉半從內入於絡胃之絡貫膈者也其氣奔入之急則沖透膈膜而痰得以居之痰入既久則阻礙氣道而氣之奔入者復結一囊如蜂子之營穴日增一日故治之甚難必先去胃中之痰而不嘔不觸俾胃經之氣不急奔於絡轉虛其胃以聽絡中之氣返還於胃逐漸以藥開導其囊而滌去其痰則自愈矣此昌獨得之見屢試之法也曰所言身內病情消息如寶鑑列眉令人欽服生平讀醫書於五臟位置不能無疑請並明之人身戴九履一左三右七五居中宮則心南腎北肝東肺西乃定位也乃腎不居正北而分隸東北西北者何耶曰腎有兩故分隸兩旁而虛其在中之位以為用所謂兩腎中間一點明正北方水中之真火而為藏精宅神之本其體雖分左右而用實在中故心腎交媾之所各該三寸六分設從兩腎歧行而上其去中黃不太遠乎凡內觀五臟當觀其用也曰肺為一身之華蓋如蓮花舒葉於心之上位正乎中何以定其位於西南耶誠如兩腎之例則西南可位豈東南獨不可位乎曰肺居心上其募不與左連但從右達其用亦在西也曰其不與左連者何也曰地不滿東南其位常空隙不用設肺募得與左連地無缺陷矣曰然則天不滿西北何以右腎居之耶曰兩腎之用在中此不過其空位耳惟右腎為空位故與三焦之有名無形者相配而三焦則決瀆之官水道由之而出正以天不滿西北也曰然則脾胃居右其用亦在右耶曰胃居中脾居右胃中所容之水穀全賴脾以運行而注其氣以輸周身其用即在中也其用在中故西方可容肺脾二臟若脾之用在右則置肺之用於何所乎曰然則肝之用何在耶曰肝木居於正東東南為地之空位其氣既無主東北為左腎之本位其用又不存故肝之氣得以徹上徹下全運於東方其為用也大矣曰然則心之用何在耶曰心之外有包絡包絡之外曰膻中心者君主之官膻中者臣使之官是膻中為心之用也曰心之神明其用何在耶曰神明之用無方無體難言也道經云太玄無邊際妙哉大洞經曰太玄曰無邊際曰妙哉形容殆盡矣禪機云赤肉團上有一無位真人旨哉斯言惟無位乃稱真人設有位則仍為赤肉團矣欲窺其倪惟在感而遂通之界先生曰吾淺言之人能常存敬畏便可識神明之所起曰此堯兢舜業而為允執者也昌多言反晦先生一言逗出誠為布鼓過雷門矣因並記之胡卣臣先生曰每與嘉言接談如見劉穎川兄弟使人神思清發或體氣偶有未佳則陳琳一檄枚氏七發少陵五言詩輞川幾重圖無不備矣觀此論至明至正至精至微愧無馬遷筆為作倉公傳也論顧鳴仲痞塊錮疾根源及治法顧鳴仲有腹疾近三十年朝寬暮急每一大發腹脹十餘日方減食濕面及房勞其應如響腹左隱隱微高鼓呼吸觸之汩汩有聲以痞塊法治之內攻外貼究莫能療余為懸內照之鑑先與明之後乃治之人身五積六聚之證心肝脾肺腎之邪結於腹之上下左右及當臍之中者皆高如覆盂者也膽胃大小腸膀胱命門之邪各結於其本位不甚形見者也此證乃腎臟之陰氣聚於膀胱之陽經有似於痞塊耳何以知之腎有兩竅左腎之竅從前通膀胱右腎之竅從後通命門邪結於腹之左畔即左腎與膀胱為之府也六腑惟膽無輸瀉其五腑受五臟濁氣傳入不能久留即為輸瀉者也今腎邪傳於膀胱膀胱溺其輸瀉之職舊邪未行新邪踵至勢必以漸透入膜原如革囊裹物者然經曰膀胱者州都之官津液藏焉氣化則能出矣然則腎氣久聚不出豈非膀胱之失其運化乎夫人一團之腹大小腸膀胱俱居其中而胞又居膀胱之中惟其不久留輸瀉是以寬乎若有餘地今腎之氣不自收攝悉輸膀胱膀胱蓄而不瀉有同膽腑之清淨無為其能理乎宜其脹也有與生俱焉者矣經曰腎病者善脹尻以代踵脊以代頭倘膀胱能司其輸瀉何致若此之極耶又曰巨陽引精者三曰太陽膀胱經吸引精氣者其脹止於三日此之為脹且數十年之久其吸引之權安在哉治法補腎水而致充足則精氣深藏而膀胱之脹自消補膀胱而令氣旺則腎邪不蓄而輸化之機自裕所以然者以腎不補不能藏膀胱不補不能瀉然補腎易而補膀胱則難以本草諸藥多瀉少補也經於膀胱之豫不足者斷以死期後人莫解其故吾誠揣之豈非以膀胱愈不足則愈脹脹極勢必逆傳於腎腎脹極勢必逆傳於小腸小腸脹極勢必逆傳於脾乃至通身之氣散漫而無統耶醫者於未傳之先蚤見而預圖之能事殫矣胡卣臣先生曰言腹中事如張炬而遊洞天愈深愈朗袁聚東痞塊危證治驗袁聚東年二十歲生痞塊臥床數月無醫不投日進化堅削痞之藥漸至枯瘁肉脫面黧髮捲殆無生理買舟載往郡中就醫因慮不能生還而止然尚醫巫日費余至則家計已罄姑請一診以決生死遠近耳無他望也余診時先視其塊自少腹至臍旁分為三岐皆堅硬如石以手拊之痛不可忍其脈止兩尺洪盛余微細謂曰是病由見塊醫塊不究其源而誤治也初起時塊必不堅以峻猛藥攻之至真氣內亂轉護邪氣為害如人廝打扭結一團旁無解散故迸緊不放其實全是空氣聚成非如女子衝任血海之地其月經凝而不行即成血塊之比觀兩尺脈洪盛明明是少陰腎經之氣傳於膀胱膀胱之氣本可傳於前後二便而出誤以破血之藥兼破其氣其氣遂不能轉運而結為石塊以手摩觸則愈痛情狀大露若是血塊得手則何痛之有此病本一劑可瘳但數月誤治從上至下無病之地亦先受傷姑用補中藥一劑以通中下之氣然後用大劑藥內收腎氣外散膀胱之氣以解其相廝相結約計三劑可痊愈也於是先以理中湯少加附子五分服一劑塊已減十之三再用桂附藥一大劑腹中氣響甚喧頃之三塊一時頓沒戚友共駭為神再服一劑果然全愈調攝月餘肌肉復生面轉明潤堆云之發才剩數莖而已每遇天氣陰寒必用重裀厚被蓋覆不敢起身余謂病根尚在蓋以腎氣之收藏未固膀胱之氣化未旺兼之年少新婚倘犯房室其塊復作仍為後日之纍更用補腎藥加入桂附而多用河車為丸取其以胞補胞而助膀胱之化源也服之竟不畏寒腰圍亦大而體加充盛年餘又得子感前恩而思建祠肖像以報以連值歲凶姑尸祝於家庭焉亦厚之道矣胡卣臣先生曰辨證十分明徹故未用藥先早知其功效矣又早善其後得心應手之妙一一傳之紙上大有可觀論楊季蘅風廢之證並答門人四問季蘅翁稟豐軀偉望七之齡神采不衰近得半身不遂之證已二年矣病發左半口往右喎昏厥遺溺初服參朮頗當為黠醫簧以左半屬血不宜補氣之說幾致大壞云間施笠澤以參附療之稍得向安然概從溫補未盡病情也診得脈體軟滑中時帶徑疾蓋痰與風雜合之證痰為主風為標也又熱與寒雜合之證熱為主寒為標也平時手冷如冰故痰動易至於厥然厥已復蘇蘇已嘔去其痰眠食自若雖冬月亦能耐寒無取重裀復絮可知寒為外顯之假寒而熱為內蘊之真熱既有內蘊之熱自蒸脾濕為痰久久阻塞竅隧而衛氣不周外風易入加以房幃不節精氣內虛與風相召是以雜合而成是證耳及今大理右半脾胃之氣以運出左半之熱痰虛風此其間有微細曲折非只溫補一端所能盡者何也治雜合之病必須用雜合之藥而隨時令以盡無窮之變即如冬月嚴寒用事身內之熱為外寒所束不得從皮膚外泄勢必深入筋骨為害矣故用姜附以暫撤外寒而內熱反得宣泄若時令之熱與內蘊之熱相合復助以姜附三熱交煽有灼筋腐肉而已孰是用藥之權衡可以一端盡耶或者曰左半風廢而察脈辨證指為兼痰兼熱似矣痰者脾濕所生寄居右畔是則先宜中右而何以反中左耶既已中左明系左半受病而何以反治右耶不知此正病機之最要者但為丹溪等方書說病在左血多病在右氣多教人如此認證因而起後人之偏執至內經則無此說也內經但言左右者陰陽之道路夫左右既為陰陽往還之道路何嘗可偏執哉況左半雖血為主非氣以統之則不流右半雖氣為主非血以麗之則易散故肝膽居左其氣常行於右脾胃居右其氣常行於左往來灌注是以生生不息也肝木主風脾濕為痰而風與痰之中人原不分於左右但翁恃其體之健過損精血是以八八天癸已盡之後左半先虧而右半飲食所生之痰與皮毛所入之風以漸積於空虛之府而驟發始覺耳風脈徑疾痰脈軟滑惟徑疾故病則大筋短縮即舌筋亦短而蹇於言小筋弛長故從左而喎於右從左喎右即可知左畔之小筋弛而不張也若小筋能張則左喎矣凡治一偏之病法宜從陰引陽從陽引陰從左引右從右引左蓋觀樹木之偏枯者將溉其枯者乎抑溉其未枯者使榮茂而因以條暢其枯者乎治法以參朮為君臣以附子乾薑為佐使寒月可恃無恐以參朮為君臣以羚羊角柴胡知母石膏為佐使而春夏秋三時可無熱病之纍然宜刺手足四末以泄榮血而通氣恐熱痰虛風久而成癘也門人問曰經文左右者陰陽之道路注解以運氣之司天在泉而有左間右間為訓遂令觀者茫然今先生貼以往還二字與太極動而生陽靜而生陰天地生成之數春秋自然之運適相符契矣但不知往於何始還於何終可得聞乎答曰微哉問也天地之道春氣始於左而終於右秋氣始於右而終於左夏氣始於上而終於下冬氣始於下而終於上人身亦然經云欲知其始先建其母母者五臟相承之母也又曰五臟以生克而互乘如右之肺金往左而生腎水克肝木左之心火往右而生脾土克肺金之類其往還交織無端然始於金者生則終於土克則終於火始於火者生則終於木克則終於水此則交織中之次第也推之十二經如子時注少陽膽丑時注厥陰肝之類亦交織中之次第也誠建其母推其類而始終大略睹矣又問曰病機之左右上下其往還亦有次第乎答曰病機往還之次第不過順傳逆傳兩端順傳者傳其所生乃天地自然之運如春傳夏夏傳長夏長夏傳秋秋傳冬冬復傳春原不為病即病亦輕逆傳者傳其所克病輕者重重者死矣如春傳長夏長夏傳冬冬傳夏夏傳秋秋傳春非天地自然之運故為病也曰經言間傳者生七傳者死則間傳為順傳七傳為逆傳無疑曰非也注難經者言間傳是順行隔一位而傳誤認病機但從右旋左不從左旋右皆繇不知左右往還之理而以訛傳訛試詰以腎水間一位傳心火為逆傳之賊邪則無可置喙矣故間傳七傳俱於逆傳中分生死耳間傳者心病當逆傳肺乃不傳肺而傳肺所逆傳之肝肺病當逆傳肝乃不傳肝而傳肝所逆傳之脾推之肝病脾病腎病皆然此則臟腑不受克賊故可生也七傳者前六傳已逆周五臟第七傳重復逆行如心臟初受病二傳於肺則肺臟傷三傳於肝則肝臟傷四傳脾五傳腎六傳仍歸於心至七傳再入於肺則肺已先傷重受賊邪氣絶不支矣所謂一臟不兩傷是以死也不比傷寒傳經之邪經盡再傳反無害也針經云善針者以左治右以右治左夫人身之穴左右同也乃必互換為治推之上下莫不皆然於往還之機益明矣又問曰半身不遂之病原有左右之分豈左右分屬之後病遂一往不返乎而治之迄無成效者何也答曰風與痰之中人各隨所造初無定體病成之後亦非一往不返也蓋有往有復者天運人事病機無不皆然如風者四時八方之氣從鼻而入乃天之氣也痰者五穀百物之味從口而入脾胃之濕所結乃地之氣也勢本相遼亦嘗相兼全似內傷之與外感每夾雜而易炫故風勝者先治其風痰勝者先治其痰相等則治風兼治痰此定法也內經云風之中人也先從皮毛而入次傳肌肉次傳筋次傳骨髓故善治者先治皮毛其次治肌肉繇此觀之乃從右而漸入於左也皮毛者右肺主之肌肉者右胃主之筋脈者左肝主之骨髓者左腎主之從外入者轉入轉深故治皮毛治肌肉不使其深入也又曰濕之中人也先從足始此則自下而之上無分左右者也但內風素勝之人偏與外風相召內濕素勝之人偏與外濕相召內風之人大塊之噫氣未動而身已先傷內濕之人室中之礎磉未潤而體已先重是以治病必從其類也從外入者以漸而驅之於外從下上者以漸而驅之於下若任其一往不返安貴其為治乎又問曰從外入者驅而之外從下上者驅而之下驟聞令人爽然不識古法亦有合歟答曰此正古人已試之法但未挈出則不知作者之意耳如治風大小續命湯方中桂附苓朮麻防等藥表裡龐雜今人見為難用不知用附桂者驅在裡之邪也用苓朮者驅在中之邪也而用麻防等表藥獨多者正欲使內邪從外而出也至於病久體虛風入已深又有一氣微汗之法一旬微利之法平調半月十日又微微驅散古人原有規則也至於治痰之規則不見於方書如在上者用瓜蒂散梔豉湯等方在左者用龍薈丸在右者用滾痰丸以及虛人用竹瀝達痰丸沉寒錮冷用三建湯之類全無奧義豈得心應手之妙未可傳之紙上耶吾今為子輩傳之蓋五味入口而藏於胃胃為水穀之海五臟六腑之總司人之食飲太過而結為痰涎者每隨脾之健運而滲灌於經隧其間往返之機如海潮然脾氣行則潮去脾氣止則潮回所以治沉錮之法但取辛熱微動寒痰已後止而不用恐痰得熱而妄行為害不淺也不但痰得熱而妄行即脾得熱而亦過動不息如潮之有去無回其痰病之決裂可勝道哉從來服峻補之藥者深夜亦欲得食皆不知其故反以能食為慶曾不思愛惜脾氣令其晝運夜息乃可有常況人身之痰既繇胃以流於經隧則經隧之痰亦必返之於胃然後可從口而上越從腸而下達此惟脾氣靜息之時其痰可返故人有痰症者早食午食而外但宜休養脾氣不動使經隧之痰得以返之於胃而從胃之氣上下不從脾之氣四達乃為善也試觀人痰病輕者夜間安臥次早即能嘔出泄出痰病重者昏迷復醒反能嘔出泄出者豈非未曾得食脾氣靜息而豫痰以出路耶世之喜用熱藥峻攻者能知此乎噫天下之服辛熱而轉能夜食者多矣肯因俚言而三思否胡卣臣先生曰知之深故言之詳然皆根據內經而非創說又自有神悟而非襲說豫嚮者極歎服王宇泰繆仲淳真是齊人知管晏耳治葉茂卿小男奇證效驗並詳誨門人葉茂卿乃郎出痘未大成漿其殼甚薄兩月後尚有著肉不脫者一夕腹痛大叫而絶余取梨汁入溫湯灌之少蘇頃復痛絶灌之復蘇遂以黃芩二兩煎湯和梨汁與服痛止令制膏子藥頻服不聽其後忽肚大無倫一夕痛叫小腸突出臍外五寸交紐各二寸半如竹節壺頂狀莖物絞摺長八九寸明亮如燈籠外症從來不經聞見余以知之素審仍為治之以黃芩阿膠二味日進十餘劑三日後始得小水五日後水道清利臍收腫縮而愈門人駭而問曰此等治法頑鈍一毫莫解乞明示用藥大意答曰夫人一身之氣全關於肺肺清則氣行肺濁則氣壅肺主皮毛痘不成漿肺熱而津不行也殼著於肉名曰甲錯甲錯者多生肺癰癰者壅也豈非肺氣壅而然與腹痛叫絶者壅之甚也壅甚則並水道亦閉是以其氣橫行於臍中而小腸且為突出至於外腎弛長尤其剩事矣吾以黃芩阿膠清肺之熱潤肺之燥治其源也氣行而壅自通源清斯流清矣緣病已極中之極惟單味多用可以下行取效故立方甚平而奏功甚捷耳試以格物之學為子廣之凡禽畜之類有肺者有尿無肺者無尿故水道不利而成腫滿以清肺為急此義前人闡發不到後之以五苓五皮八正等方治水者總之未悟此旨至於車水放塘種種劫奪膀胱之劑則殺人之事矣可不辨之於蚤歟趙我完孝廉次郎秋月肺氣不能下行兩足腫潰而小水全無臍中之痛不可名狀以手揉左則痛攻於右揉右則痛攻於左當臍揉尉則滿臍俱痛叫喊不絶利水之藥服數十劑不效用敷臍法及單服琥珀末至兩許亦不效昌見時彌留已極無可救藥矣傷哉胡卣臣先生曰凡求同理者必不求同俗嘉言之韜光匿採寧甘訕謗曾不令人窺識者無意求知也豈見此而有不心折者耶議沈若茲乃郎腸澼危證並治驗沈若茲乃郎因痘後食物不節病瀉瀉久脾虛病瘧遂爾腹痛脹大三年來服消導藥無算腹脹及瀉利總不愈去歲迎醫服參苓白朮稍效醫去仍復如故病本腹脹更兼腸澼腸澼者大腸之氣空洞易走胃中傳下之物總不停留澼出無度腥水不臭十中五死五生之症也今則病勢轉深又加四逆矣暮熱朝涼一逆也大渴引湯救急二逆也氣喘不能仰睡三逆也多汗煩躁不寧四逆也無病人腹中之氣運轉收攝是以身體輕快大便省約今為久瀉遂至氣散不收腹之脹腸之鳴便出之不自知皆此故也氣既散而不收又服行氣利水之藥不愈增其散乎無病人身中營衛兩無偏勝故陽勝則發熱陰勝則惡寒病瘧之時寒熱交作猶是陰陽互戰逮瀉久亡陰整夜發熱一線之陰為陽所乘求其相戰不可得矣內水虧竭燎原之火自焚不得不引外水以濟急然有形之水不足以制無形之火徒增脹瀉而重傷其陰氣耳醫不清其源以香燥之藥助火劫陰如官桂肉豆蔻等類用之誤矣夫男子氣海在於臍下乃元氣之舍性命之根也久瀉則真氣亦散勢必上干清道而不下行鼻中鼾鼾有聲不能仰臥是其徵也夫此已散之氣必不能復歸其處但冀未散之氣不致盡散則可耳屢服木香檳榔蘇子腹皮厚朴等降氣之藥尤誤之誤矣至於汗出煩躁則陰氣虛盡孤陽亦不能久留之兆也總如歲運有溫熱無寒涼有生長無收藏人物能免夭札疵癘乎於此而圖旋轉之功亦難之難矣若茲見案轉託戚友強懇用藥因以清燥潤肺為主阿膠地黃門冬等類同蜜熬膏三斤渠男三年為藥所苦得此甘味稱為糖也日爭十餘次服之半月藥盡遂至大效身涼氣平不渴不煩不瀉諸症俱退另制補脾藥末善後全愈胡卣臣先生曰久瀉而用潤藥與症相反而究竟相宜議病時先闢三種治法之誤已隱隱見大意矣與吳吉長乃室治驗參看自明辨治楊季登二女奇證奇驗楊季登二女俱及笄將字長女病經閉年餘發熱食少肌削多汗而成癆怯醫見汗多誤為虛也投以參朮其血愈錮余診時見汗出如蒸籠氣水謂曰此症可療處全在有汗蓋經血內閉止有從皮毛間透出一路以汗亦血也設無汗而血不流則皮毛乾槁而死矣宜用極苦之藥以斂其血入內而下通於衝脈則熱退經行而汗自止非補藥所能效也於是以龍薈丸日進三次月餘忽覺經血略至汗熱稍輕始減前丸隻日進一次又一月經血大至淋漓五日而諸病全瘳矣第二女亦病多汗食減肌削診時手間筋掣肉顫身倦氣怯余曰此大驚大虛之候宜從溫補者也遂於補劑中多加茯神棗仁投十餘劑全不對病余為徘徊治法因自訐曰非外感也非內傷也非雜症也虛汗振掉不寧能受補藥而病無增減且閨中處子素無家難其神情渾似喪敗之餘此曷故耶忽而悟曰此必邪祟之病也何為其父不言甚有可疑往診問其面色曰時赤時黃余曰此症確有邪祟附入臟腑吾有神藥可以驅之季登才曰此女每晚睡去口流白沫戰栗而絶以薑湯灌至良久方蘇挑燈侍寢防之亦不能止因見所用安神藥甚當兼恐壻家傳聞故不敢明告也余曰何不蚤言吾一劑可愈乃以犀角羚羊角龍齒虎威骨牡蠣粉鹿角霜人參黃耆等藥合末令以羊肉半斤煎取濃汁三盞盡調其末一次服之果得安寢竟不再發相傳以為神異余蓋以祟附於身與人之神氣支持亦逼處不安無隙可出故用諸多靈物之遺形引以羊肉之膻俾邪祟轉附骨角移從大便而出仿上古遺精變氣祝繇遺事充其義耳吾鄉熊仲紓先生幼男去疾髫齡患一奇症食飲如常但脈細神呆氣奪色夭仲翁曰此何病也余曰病名淹牒左傳所謂近女室晦即是此病彼因近女又遭室晦故不可為令郎受室晦之邪而未近女是可為也即前方少加牛黃丸服旬日而安今壬午去疾已舉孝廉矣胡卣臣先生曰辨症用藥通於神明究莫測其涯涘直敘顧諟明二郎三郎布痘為宵小所誤顧諟明公郎種痘即請往看其痘苗淡紅磊落中含水色明潤可愛且顆粒稀疏如晨星之麗天門下醫者先已誇為狀元痘昌未知也躊躇良久明告曰此痘熱尚未退頭重頸軟神躁心煩便泄青白全自一團時氣外感兼帶內虛若用痘門通套藥必危之道也諟明毫不動念適值二尹請同挨戶查賑饑民出街親董其事余忙造其契戚家謂曰我觀諟明公郎在家布痘而精神全用於賑饑雖仁人長者之事然此等處他人可代乃自任不辭明明言之絶不回顧此必有醫者誇美獻諛而信之篤耳不然豈有倒行逆施之理哉此痘必得一二劑藥先退其外感則痘不治自痊若遲二三日緩無及矣相煩速往朝陽門內外追尋直述鄙意其戚聞言即往余亦回寓修書投之其辭激切不避嫌疑傍晚一僕攜回書至擲於几上忿忿而去余以為諟明之見責也折視則云尊翁大人必欲得方始肯服藥余即定一方並詳論方中大意令僮輩齎送僮輩竊謂余之不智也一日三四次奔走大人之門是自忘其恥辱矣吁嗟余豈不自愛但當群小矇蔽時倘得一撥立轉所全頗巨於是親送其方至門則內戶已扃閽人收之次早送進余暗地獨行往返六里以圖心安次日再托其戚促之進藥則云既是狀元痘何必服藥耶此後即欲一造其庭末繇矣吁嗟朝廷之上任者議者不妨互用使余得與其側此兒即不服藥亦必無死法蓋感症在身而以蝦魚雞筍發痘之物雜投誤上加誤適所以促其亡耳才至六日而壞正應感症壞期若痘出既美即有意外變症亦在半月一月矣越二日三公郎即發熱布痘仍夾時氣外感仍用前醫仍六日而壞旬日間兩兒為一醫所殺諟明引為己辜設局施藥於城隍廟余偶見之蹙然曰盛德之人恐懼修省皇天明神豈無默庇然賞善自應罰惡而殺兒之醫寧無速奪其算耶一夕此醫暴亡余深為悚惕然尚有未暢者左右之宵人未嘗顯誅也胡卣臣先生曰讒諂蔽明邪曲害正今古一轍而幽憤所至真足以動鬼神之吉凶論劉筠枝長郎失血之證筠翁長郎病失血歲二三發其後所出漸多咳嗽發熱食減肌削屢至小康不以為意夏秋間偶發寒熱如瘧狀每夜達曙微汗始解嗣後寒熱稍減病轉下利醫謂其虛也進以參朮胸膈迷悶喉音窒塞服茯苓山藥預收紅鉛末下黑血塊數升胸喉頓舒而容亦轉筠翁神之以為得竹破竹補之法也加用桂附二劑於是下利一晝夜十數行飲食難入神識不清病增沉劇僕診其脾脈大而空腎脈小而亂肺脈沉而伏筠翁自謂知醫令僕疏方並問此為何症僕曰此症患在亡陰況所用峻熱之藥如權臣悍帥不至犯上無等不已行期在立冬後三日以今計之不過信宿無以方為也何以言之經云暴病非陽久病非陰則數年失血其為陽盛陰虛無疑況食減而血不生漸至肌削而血日槁虛者益虛盛者益盛勢必陰火大熾上炎而傷肺金咳嗽生痰清肅下行之令盡壅繇是腎水無母氣以生不足以蔭養百骸柴柵瘦損每申酉時灑淅惡寒轉而熱至天明微汗始退正如夏日炎蒸非雨不解身中之象明明有春夏無秋冬用藥方法不亟使金寒水冷以殺其勢一往不返矣乃因下利誤用參朮補劑不知肺熱已極止有從皮毛透出一路今補而不宣勢必移於大腸所謂肺移熱於大腸傳為腸澼者是也至用紅鉛末下黑血者蓋陽分之血隨清氣行者久已嘔出其陰分之血隨濁氣行至胸中為膜原所蔽久瘀膈間者得經水陰分下出之血引之而走下竅聲應氣求之妙也久積頓寬面色稍轉言笑稍適者得其下之之力非得其補之之力也乃平日預蓄此藥必為方士所惑見為真陽大藥遂放膽加用桂附燥熱以盡劫其陰惜此時未得止之今則兩尺脈亂火燔而泉竭脾胃脈浮下多陰亡陽無所附肺脈沉伏金氣縮斂不行神識不清而魄已先喪矣昔醫云亂世溷濁有同火化夫以火濟火董曹乘權用事漢數焉得不終耶胡卣臣先生曰論症論藥俱從卓識中流出大有關係之作論錢小魯嗜酒積熱之證錢小魯奕秋之徒也兼善飲每奕必飲飲必醉歲無虛日辛巳秋浩飲晚歸嘔吐寒熱兼作骨節煩疼醫以時行感冒表散藥治之不愈更醫知為酒毒於寒涼藥中用熱藥為鄉導治之亦不愈臥床二十餘日始請余診其脈洪大促急身耎著席不能動展左腿痛如刀刺鼻煤從病起至是總不大便此癰疽之候也歸語兩門人王生欣然有得曰迄今燥金司令酒客素傷濕熱至此而發金盛則木衰是以筋骨疼痛而不能起於床臟燥而腑亦燥是以津液乾枯而大腸失其潤以清金潤燥治之可矣吳生曰不然酒毒大發腸胃如焚能俟掘井取水乎是必以大下為急也余曰下法果勝但酒客胃氣素為多嘔所傷藥入胃中必致上壅不能下達即敷臍導腸等法無所用之掘井固難開渠亦不易奈何奈何吾為子輩更開一竇夫酒者清冽之物不隨濁穢下行惟喜滲入者也滲入之區先從胃入膽膽為清淨之府同氣相交故也然膽之收攝無幾其次從胃入腸膀胱滲之化溺為獨多焉逮至化溺則所存者酒之餘質其烈性實惟膽獨當之每見善飲者必慢斟緩酌以俟腹中之滲若連飛數觥有傾囊而出耳是以酒至半酣雖懦夫有揮拳罵座之膽雖窶人有千金一擲之膽雖狷士有鑽穴逾垣之膽甚至凶徒有撫劍殺人之膽以及放浪形骸之流且有一飲數斛不顧餘生之膽以小魯之赤貧而膽不喪落者夫非藉資於酒乎其受病實有較他人不同者蓋膽之腑原無輸瀉膽之熱他人可移於腦濁涕從鼻竅源源而出亦少殺其勢若小魯則陽分之陽過旺陽分之陰甚衰髮鬢全無直似南方不毛之地熱也極矣肯受膽之移熱乎幸其頭間多汗腦熱暗泄不為大患乃膽熱既無可宣又繼以酒之熱時之燥熱淫內熾脈見促急幾何不致極憊耶故膽之熱汁滿而溢出於外以漸滲於經絡則身目俱黃為酒疸之病以其滲而出也可轉驅而納諸膀胱從溺道而消也今獨攻環跳之穴則在膽之本屬可無驅矣且其步履素為此穴所苦也受傷已久氣離血散熱邪彌滿留連服藥縱多有拒而不納耳何能取效即欲針之此久傷之穴有難於抉瀉者設遇良工如古人輩將何法以處此乎吾更有慮焉有身以後全賴穀氣充養穀氣即元氣也谷入素少之人又即藉酒為元氣今以病而廢飲何所恃為久世之資耶吾諦思一法先搐腦中黃水出鼻次針膽穴之絡腦間者數處務期膽中之熱移從腦鼻而出庶乎環跳穴中結邪漸運而腸胃之枯槁漸回然後以瀉膽熱之藥入酒中每日仍痛飲一醉飲法同而酒性異始得陰行而妙其用蓋其以生平之偏造為堅壘必藉酒為鄉導乃克有濟也豈清金潤燥與下奪之法能了其局乎兩生踴躍曰蒙誨治法令人心地開朗請筆之以志一堂授受之快録此付渠子令送商顧幼疏孝廉求救小魯竟阻之或以余言為不然耶胡卣臣先生曰先寫全神後論治法大是奇觀面論李繼江痰病奇證李繼江三二年來嘗苦咳嗽生痰胸膈不寬今夏秋間臥床不起瀕亡者再其人以白手致素封因無子自危將家事分撥安心服死忽覺稍安亦心死則身康之一徵也未幾仍與家事其病復作然時作時止疑為不死之病也聞余善議病托戚友領之就診見其兩頤旁有小小壘塊數十高出即已知其病之所在因詰之曰爾為何病曰咳嗽曰嗽中情狀試詳述之曰內中之事愚者不知是以求明耳余為哂曰爾寒暑飢渴悉不自知耶觀爾脈盛筋強必多好色而喜任奔走本病宜發癰疽所以得免者以未享膏粱之奉且火才一動便從精孔泄出耳然雖不病癰而病之所造今更深矣爾胸背肩髃間巉巖如亂石插天櫛比如新筍出土嵌空如蜂蓮之房芒鋭如棘栗之刺每當火動氣升痰壅緊逼之時百苦交煎求生不生求死不死比桁楊之罪人十倍過之尚不自知耶渠變容頓足而泣曰果實如此但吾說不出亦無人說到耳昔年背生癰癤幸未至大害然自癤愈咳嗽至今想因誤治所成亦未可知余曰不然由爾好色作勞氣不歸元騰空而上入於肝肺散葉空隙之間膜原之內者日續一日久久漸成熟路只俟腎氣一動千軍萬馬乘機一時奔輳有入無出如潮不返海潮兼天湧至倘後潮不熄則前後古今冤於此病者不知其幾但爾體堅堪耐是以病至太甚尚自無患不然者久已打破崑崙關矣爾宜歸家休心息神如同死去俾火不妄動則痰氣不為助虐而胸背之堅壘始有隙可入吾急備藥為爾覆巢搗穴可得痊也渠駭然以為遇仙托主僧請以五金購藥十金為酬而去次日復思病未即死且往鄉徵租旬日襄事購藥未遲至則因勞陡發暴不可言痰出如泉聲響如鋸面大舌脹喉硬目突二日而卒於鄉真所謂打破崑崙關也其人遇而不遇亦顧家不顧身之炯戒矣治法詳陰病論胡卣臣先生曰論病從外灼內因流識源精鑑全非影響吳添官乃母厥巔疾及自病真火脫出治驗吳添官生母時多暴怒以致經行復止入秋以來漸覺氣逆上厥如畏舟船之狀動輒暈去久久臥於床中時若天翻地覆不能強起百般醫治不效因用人參三五分略寧片刻最後服至五錢一劑日費數金意圖旦夕苟安以視稚子究竟家産盡費病轉凶危大熱引飲腦間有如刀劈食少瀉多已治木無他望矣聞余返婁延診過許以可救因委命以聽焉余以怒甚則血菀於上而氣不返於下者名曰厥巔疾厥者逆也巔者高也氣與血俱逆於高巔故動輒眩暈也又以上盛下虛者過在少陽少陽者足少陽膽也膽之穴皆絡於腦鬱怒之火上攻於腦得補而熾其痛如劈同為厥巔之疾也風火相煽故振搖而熱蒸土木相凌故艱食而多瀉也於是會內經鐵落鎮墜之意以代赭石龍膽草蘆薈黃連之屬降其上逆之氣以蜀漆丹皮赤芍之屬行其上菀之血以牡蠣龍骨五味之屬斂其浮游之神最要在每劑藥中生入豬膽汁二枚蓋以少陽熱熾膽汁必干亟以同類之物濟之資其持危扶顛之用病者藥一入口便若神返其舍忘其苦口連進十餘劑服豬膽二十餘枚熱退身涼飲食有加便瀉自止始能起床行動數步然尚覺身輕如葉不能久支僕恐藥味太苦不宜多服減去豬膽及蘆龍等藥加入當歸一錢人參三分薑棗為引平調數日而全愈母病愈而添官即得腹痛之病徹夜叫喊不絶小水全無以茱連湯加玄胡索投之痛始安又因傷食復發病至二十餘日肌肉瘦削眼胞下陷才得略寧適遭家難症變壯熱目紅腮腫全似外感有餘之候余知其為激動真火上焚令服六味地黃加知柏三十餘劑其火始退退後遍身瘡痍黃腫腹中急欲得食不能少待片頃整日哭煩余為勉慰其母曰旬日後腹稍充氣稍固即不哭煩矣服二冬膏而全瘳此母子二人皆極難辨治之症竟得相保不大快哉胡卣臣先生曰二病最多此案深足嘉惠來學論體盛絶孕治法一友繼室夫人身體肥盛經候雖調從未孕育令僕定方而施轉移化機之藥雖從古醫書所未載然可得言也蓋山之不可葬者五童斷過石獨縱有明師無所施其翦裁以故女之不可孕如方書所志生稟之殊非人工所能改移者可不更論若夫生稟不殊但為形軀所纍而嗣孕終不乏者古今來不知凡幾第夫婦之愚天然湊合之妙雖聖神有不能傳者所以方書缺焉未備耳僕試言之地之體本重厚然得天氣以苞舉之則生機不息若重陰沍寒之區天日之光不顯則物生實罕人之體中肌肉豐盛乃血之榮旺極為美事但血旺易至氣衰久而彌覺其偏也夫氣與血兩相維附何以偏衰偏旺耶蓋氣為主則血流血為主則氣反不流非真氣之衰也氣不流有似於衰耳所以一切補氣之藥皆不可用而耗氣之藥反有可施緣氣得補則愈錮不若耗之以助其流動之勢久而久之血仍歸其統握之中耳湖陽公主體肥受孕然不能産也進諸御醫商之得明者定一傷胎之方服數十劑而臨産始得順利母子俱無災害蓋肥滿之軀胎處其中全無空隙以故傷胎之藥止能耗其外之血肉而不能耗其內之真元也此用藥之妙也僕仿是意而制方預為受胎之地夫豈無術而杜撰乎然而精誠之感貫於金石女之宜男者先平其心心和則氣和氣和則易於流動充滿也其次在節食仙府清肌恆存辟穀宮中細腰得之忍飢志一動氣何事不成耶而且為齊心積德以神道之教補藥餌之不逮有不天人葉應者乎僕於合浦求珠藍田種玉之舉而樂道之胡卣臣先生曰觀此一論不必問方而已得其意之所存破盡尋常窠臼矣奇創奇創華太夫人餌術方論天御孝廉太夫人宿有胸膈氣脹小恙近臻勿藥矣孝廉膝下承歡不以三公易一日者今而後喜可知也然以太夫人福體凝重惟恐日增一日轉為暮年之纍欲僕訂方及早圖之僕不覺悚然而動於衷曰孝廉未嘗習醫乃思治未病消未萌何其深於醫旨若是以知子道之貫徹者無微不入矣經曰陰精所奉者其人壽太夫人陰血有餘即年過百歲而形不衰此可不問而知者然形盛須充之以氣而氣者漸衰漸耗之物必欲兩得其平所藉於藥力不少耳況氣復有陰陽之別身半以上陽主之身半以下陰主之陰氣過盛而乘陽位則胸膈脹悶不舒所謂地氣上為云者是也云生而天地之寥闊頃刻窒塞矣故陰氣不可盛也陰氣盛勢不得不用耗散之藥氣日耗則體日重又不能兼理之術也湖陽公主以體盛難産御醫為制枳殼厚朴等耗氣之藥名曰瘦胎散亦以當其壯年耳若夫年高氣弱之時而可堪其耗散乎我儀圖之至人服天氣而通神明只此一語足為太夫人用藥之准矣蓋天食人以五氣者也地食人以五味者也以地之味養陰不若以天之氣養陽藥力既久天氣運而不積挈地氣以周旋所謂載華嶽而不重者大氣舉之之謂也方用茅山蒼朮一味取其氣之雄烈可驅陰邪而通天氣本草列之上品仙經號為山精者誠重之也每歲修事五七斤每早百沸湯吞下三錢秋月止服二錢另用天門冬一錢煎湯吞下初服一兩月微覺其燥服至百日後覺一日不可缺此矣服之一年身體輕健服之三年步履如飛黑夜目中有光可燭幽隱所謂服天氣而通神明者其不誣如此食物諸無所忌但能稍遠肥甘白飯香疏苦茗種種清勝尤妙僕餌術以後身健無病今服三十餘斤矣胡卣臣先生曰此成方也用之通天氣以苞舉乎地覺制方之人未必辨此陸子堅調攝方論子堅玉體清和從來無病邇因外感之餘益以飢飽內傷遂至胸膈不快胃中隱隱作痛有時得食則已有時得食反加大便甚艱小水不暢右關之脈乍弦乍遲不相調適有似錮疾之象用藥得當驅之無難若歲久日增後來必為大患大意人身胃中之脈從頭而走於足者也胃中之氣一從小腸而達於膀胱一從小腸而達於大腸者也夫下行之氣濁氣也以失調之故而令濁氣亂於胸中干其清道因是窒塞不舒其始本於病時胃中津液為邪火所爍至今津液未充火勢內蘊易於上燎所以得食以壓其火則安然邪火熾則正氣消若食飲稍過則氣不能運轉其食而痛亦增是火不除則氣不復氣不復則胃中清濁混亂不肯下行而痛終不免也病屬胃之下脘而所以然之故全在胃之中脘蓋中者上下四旁之樞機中脘之氣旺盛有餘必驅下脘之氣入於大小腸從前後二陰而出惟其不足所以反受下脘之濁氣而撓指也夫至人之息以踵呼之於根吸之於蒂者也以濁氣上干之故究竟吸入之氣艱于歸根且以痛之故而令周身之氣凝滯不行亦非細故也為訂降火生津下氣止痛一方以為常用之藥尚有進者在先收攝腎氣不使外出然後濁氣之源清而膀胱得吸引上中二焦之氣以下行想明哲知所務矣胡卣臣先生曰言一病即知其處既知其處矣又知其上下正反之因猶珠玉之光積而成照非有意映重淵連赤極也與黃我兼世兄書尊夫人驚痰堵塞竅隧肝肺心包絡間無處不有三部脈虛軟無力邪盛正衰不易開散有欲用湧劑稍吐十分之三誠為快事弟細籌之此法殆不可行蓋湧法正如兵家劫營之法安危反掌原屬險道況痰迷不過片晌耳設以湧藥投之痰才一動人即暈去探之指不得入咽之氣不能下藥勢與病勢相扼轉致連日不蘇將若之何無已如丹溪所云懼吐者宜消息下之乎不知竅隧之痰萬不能導即導之下行徒傷脾氣痰愈窒塞此法亦不可用也為今之計確以理脾為先脾氣者人身健運之陽氣如天之有日也陰凝四塞者日失其所痰迷不省者脾失其權耳理脾則如烈日當空片云纖翳能掩之乎其次莫如清肺肺為將帥之官氣清則嚴肅下行氣下行則痰之藉為堅城固壘者方示以暇而可用其攻擊之力所謂攻堅則暇者亦堅攻暇則堅者亦暇是也今四末腫麻氣壅已甚尤不可不亟亟矣其理脾之法須藥餌與食飲相參白飯香蔬苦茗便為佳珍不但滑膩當禁即粥亦不宜食以粥飲之結為痰飲易易耳不但雜食當禁即飯食亦宜少減以脾氣不用以消穀轉用之消痰較藥力萬萬耳其辛辣酒脯及煎爆日曝之物俱能傷肺並不宜食至於用藥弟自有節次矩矱俟日漸輕安來春方奏全最也緣此病人不識治前賢亦未見高出手眼弟思之纍日竊以為要領在是所以必欲持久者與金城方略同意且先除脅從後殲巨魁自勢所不易捷得之事惟臺兄裁酌進教毋謂小恙過矜迂遠不切幸孔幸孔驚痰之來始於肝膽冬月水氣歸根不敢攻治故但以理脾藥平調必至春月木旺才用四君子湯加龍膽草蘆薈代赭石黃連青黛等藥為丸服之痰迷之證果獲全瘳此後不發胡卣臣先生曰情形方略指畫無遺古名將中求其人不可多得也辨黃鴻軒臂生癰癤之證並治驗黃鴻軒手臂忽生癰癤蔓腫無頭痛極莫耐外科醫者咸謂熱毒所致揆之平素淡泊明志寧靜居心絶無生熱致毒之因究莫識其所起也尊公我兼謂昌善議病盍舍樽俎而一代庖人乎昌曰吾議此證請先為致賀後乃言之瘡瘍之起莫不有因外因者天行不正之時毒也起居傳染之穢毒也內因者醇酒厚味之熱毒也鬱怒橫決之火毒也治火毒與治諸毒原自天淵蓋火與元氣勢不兩立以寒涼折之則元氣轉漓矣鴻軒於四者總無其因不問知為胎毒之餘也凡人稟受天地之氣有清濁之不同惟純粹以精之體其福澤壽算俱不可限量然從父母媾精而有身未免夾雜欲火於形骸所賴者惟在痘瘡一舉暗將所藏欲火運出軀外復其粹精之恆體如礦金相似必經紅爐煅煉而渣滓與精瑩始分之為兩吾常以此法觀出痘者之眸子七八日後眼開之時黑白分明者精金也赤筋紅膜包裹者混金也至於瞳人模糊神光不現則全非金矣鴻軒幼時出痘太多元氣不能充灌又為雜證所妨臟腑中之火毒雖盡而軀殼間之留滯猶存所以痘癰之發必於手足之委中曲池者則以零星小毒無處可容而潛避於呼吸難到之處耳今之癰癤正當委中之穴其為痘毒何疑毒伏肘腋之下原無所害但粹精之體微有夾雜是亦寶鑑之纖塵白璧之微瑕也日者太和元氣充滿周身將十五年前之餘滓盡欲化為膿血而出他人見之為毒吾蚤已卜其為興者機矣豈有暢於四肢而不發於事業者哉治法外用馬齒莧熬膏攻之速破內用保元湯托之盡出仍以痘癰門藥為治即日自當痊愈必不似瘡毒之曠日持久但不識證而以治瘡毒寒涼瀉火諸藥投之適以增楚貽患耳孰謂外科小恙可無樽俎折衝之人耶如法治之潰出膿水甚多果不用生肌長肉而自愈胡卣臣先生曰以慧心辨證竟出恆理而降衷所以不齊受衷所以相遠之故盡逗毫端治火一法礦金一喻驗目一訣種種指示俱足令人心開神爽論士大夫喜服種子壯陽熱藥之誤人生有性分之樂有勢分之樂有形體康健之樂性分之樂四時皆春萬物同體雖環堵蕭然而樂在也雖五官弗備而樂在也雖夷狄患難而樂亦在也溪山風月有我便是主人木石禽魚相親悉為好友何取溺情枕席肆志淫佚也哉即造物小兒無所施其播弄矣至於勢分之樂與康健難老之樂惟福厚者始兼有之蓋得貴之與得壽其源若有分合兩途少年芚朴不凋此壽基也而嫌其精采不露髫齜機神流動此貴徵也而嫌其渾敦太鑿此其間半豫天半豫人而後天奉若之功不知費幾許小心然後可凝休而永命故在得志以後既知此身為上天托界之身自應葆精嗇神以答天眷若乃女愛畢席男歡畢輸竭身中之自有而藉資於藥餌責效於眉睫致宵小無知之輩得陰操其禍人之術以冀捷獲雖前代之覆轍皆然而今時為益烈矣蓋今者雍熙之象變為繁促世運已從火化復以躁急之藥濟之幾何不喪亡接踵乎此道惟岐黃言之甚悉但仕宦家不肯細心究討耳其云凡陰陽之道陽密乃固兩者不和如春無秋如冬無夏是故因而同之是謂聖度此段經文被從前注解埋沒不知乃是明言聖人於男女之際其交會之法度不過使陽氣祕密乃得堅固不泄耳然而陰陽貴相和有春無秋是無陰也有冬無夏是無陽也所以聖人但調其偏以歸和同允為交會之法度而已夫聖人太和元氣生機自握我觀夫調琴弄瑟考鍾伐鼓雖閨坤之性情克諧而況於己身之血氣禮陶樂淑仁漸義摩雖民物之殷阜坐致而況於一人之嗣胤所以凡為廣嗣之計者其用藥之准但取純正以召和無取雜霸以兆戾也而經文又云陰平陽祕四字尤足互暢其義蓋陰得其平而無過不及然後陽得其祕而不走泄也此可見陽之祕密乃神聖交會所首重然欲陽之祕密即不得不豫其權於陰正以陽根於陰培陰所以培陽之基也今人以峻烈之藥劫盡其陰以為培陽益以房幃重耗漸至髓消肉減神昏氣奪毛瘁色夭尚不知為藥所誤可勝悼哉向見一浙醫宋姓者在京師製成大顆彈丸遍送仕宦託名臍帶胎髮其實用煉過硫磺在內服之令人陽道驟堅可喜未幾燥病百出吾鄉諸大老受其禍者歷歷可指近遊鹿城聞張鴻一孝廉以進紅鉛傷腦而日夜精流不止蓋腦為髓海腦熱而通身之髓盡奔究竟熱未除而髓先竭骨痿艱行矣至婁過天如先生舊宅見鼻中濁涕凡落板壁者深黃之色透入木中剗刷不除詢之亦由服種子熱藥所致後以傷風小恙竟至不起噫嘻腦熱已極蒸涕為黃出鼻之熱尚能透木曾不省悟至熱極生風尚治外而不治內也復何言哉吾鄉劉石閭先生服熱藥而病消渴醫者鄧橘存堅令服六味地黃湯千劑果效蓋得於壯水之主以制陽光之旨也高郵袁體仁種子經驗方皆用陰陽兩平之藥蓋得於陰平陽祕之旨也此老於醫而審於藥者因並表之又方士取黑鉛之水名為神水金丹以惑人凡痰火之病初得其下行之力亦覺稍爽而不知鉛性至燥轉致劫陰為害反大又有用蒸臍之藥名彭祖接命之法者夫臍為人之命根以麝香硫黃附子等大熱散氣之藥加艾火而蒸灼幸而不中真氣尚無大害若蒸動真氣散越不收擾亂不寧有速斃耳聞婁中老醫穆雲谷常誨人曰蒸臍一法有損無益斷不可行旨哉言矣亦並表之胡卣臣先生曰艱嗣之故有五一曰性偏刻好發人陰私一曰好潔遇物多不適意處一曰慳吝持金錢不使漏一線一曰喜孌童非其所用肝筋急傷一曰多服熱藥鑠真陰而盡之嘉言此論曲暢經旨以闢方士之謬而破輕信之惑真救世之藥石也論治傷寒藥中宜用人參之法以解世俗之惑傷寒病有宜用人參入藥者其辨不可不明蓋人受外感之邪必先發汗以驅之其發汗時惟元氣大旺者外邪始乘藥勢而出若元氣素弱之人藥雖外行氣從中餒輕者半出不出留連為困重者隨元氣縮入發熱無休去生遠矣所以虛弱之體必用人參三五七分入表藥中少助元氣以為驅邪之主使邪氣得藥一湧而去全非補養虛弱之意也即和解藥中有人參之大力者居間外邪遇正自不爭而退舍設無大力者當之而邪氣足以勝正氣其猛悍縱恣安肯聽命和解耶故和解中之用人參不過藉之以得其平亦非偏補一邊之意也而不知者方謂傷寒無補法邪得補彌熾斷不敢用豈但傷寒一證即痘疹初發不敢用瘧痢初發不敢用中風中痰中寒中暑及癰疽産後初時概不敢用而虛人之遇重病一切可生之機悉置之不理矣古今諸方表汗用五積散參蘇飲敗毒散和解用小柴胡湯白虎湯竹葉石膏湯等方都用人參皆藉人參之力領出在內之邪不使久留乃得速愈為快奈何世俗不察耶獨不見感入體虛之人大熱呻吟數日間爍盡津液身如枯柴初非不汗之汗之熱不退後非不和之下之和之下之熱亦不退醫者技窮委身而去不思內經所言汗出不為汗衰者死三下而不應者死正謂病人元氣已漓而藥不應手耳夫人得感之初元氣未漓也惟壯熱不退灼干津液元氣始漓愚哉愚哉倘起先藥中用人參三五七分領藥深入驅邪即刻熱退神清何致汗下不應耶況夫古今時勢不同膏粱藜藿異體李東垣治內傷兼外感者用補中益氣加表藥一二味熱服而散外邪有功千古姑置不論止論傷寒專科從仲景以至於今明賢方書充棟無不用人參在內何為今日醫家單單除去人參不用以阿諛求容全失一脈相傳宗旨其治體虛病感之人百無一活俟閻君對簿日知之悔無及矣乃市並不知醫者又交口勸病人不宜服參目睹男女親族死亡曾不悟旁操鄙見害之也謹剖心瀝血相告且誓之曰今後有以發表和中藥內不宜用人參之言誤人者死入犁耕地獄蓋不當用參而用之殺人者皆是與黃耆白朮當歸乾薑肉桂大附子等藥同行溫補之誤所致不與羌獨柴前芎桔芷芩膏半等藥同行汗和之法所致也汗和藥中兼用人參從古至今不曾傷人性命安得視為砒鴆刀刃固執不思耶最可恨者千百種藥中獨歸罪人參君主之藥世道人心日趨於疾視長上其醞釀皆始於此昌安敢與亂同事而不一亟辨之乎附人參敗毒散注驗嘉靖己未五六七月間江南淮北在處患時行瘟熱病沿門闔境傳染相似用本方倍人參去前胡獨活服者盡效全無過失萬曆戊子己丑年時疫盛行凡服本方發表者無不全活又云饑饉兵荒之餘飲食不節起居不常致患時氣者宜同此法昌按彼時用方之意倍加人參者以瘟氣易染之人體必素虛也其用柴胡即不用前胡用羌活即不用獨活者以體虛之人不敢用復藥表汗也饑饉兵荒之餘人已內虛久困非得人參之力以驅邪邪必不去所以服此方者無不全活今崇禎辛巳壬午時疫盛行道殣相藉各處醫者發汗和中藥內惟用人參者多以活人更有發癍一證最毒惟用人參入消癍藥內全活者多此人人所共見共聞者而庸愚之人泥執不破誠可哀也又有富貴人平素全賴參朮補助及遇感發尚不知而誤用譬之賊已至家閉門攻之反遭凶禍者有之此則誤用人參為溫補不得借之為口實也胡卣臣先生曰將傷寒所以用人參之理反覆辨論即婦人孺子聞之無不醒然此立言之善法也詳論趙三公郎令室傷寒危症始末並傳誨門人趙景翕太史聞昌來虞談醫一旦先之以駟馬昌心儀其賢欲敬事而效藥籠之用久矣孟冬末三公郎令室患傷寒醫藥無功漸至危篤先日進白虎湯其熱稍緩次日進人參白虎湯其勢轉重皇皇求醫因而召診昌聞其咳聲窘迫診其脈數無力壯熱不退肌膚枯澀沉困不食語景翕先生曰此病大難為惟不肖尚可悉心圖成以報知己疏方用仲景麻黃杏仁甘草石膏湯四味先生頗疑麻黃僭汗因問錢宗伯公郎服西河柳犀角而疾瘳今可用乎昌曰論太陽陽明兩經合病其症頗似但彼病秋熱此病冬寒安得比而同治況病中委曲多端河柳犀角原非正法惟仲景麻杏甘石一湯允為此病天造地設有一無二之良法先生韙之其房中女伴以不省宜話兼未悉昌之生平爭用本地經驗名家乃至服河柳而表終不解服犀角而里終不解且引熱邪直攻心臟其顛悖無倫較胃實譫語更增十倍醫者始辭心偏不可救藥吁嗟人心位正中央皇建有極而何以忽偏耶傷寒膀胱蓄血有如狂一證其最劇者間一發狂旋覆自定即心臟最虛元神飛越者間有驚狂臥起不安一證未聞有心偏之說也而病者何以得此乎未幾陽反獨留形如煙燻髮直頭搖竟成心絶之候此段疑案直若千古不決孰知有麻杏甘石為持危扶顛之大藥也哉門人請曰麻杏甘石湯不過一發表藥耳何以見其能起危困萬一用之罔效又何以起後學之信從耶余曰此淵源一脈仲景創法於前吾闡揚於後如錐入木如範鎔金所以稱為天造地設有一無二之法用則必效確無疑也蓋傷寒一證雖云傳足不傳手其實足經而兼手經者恆多醫者每遇足經六傳之病尚爾分證模糊至遇兼手十二經之證鮮不五色無主矣足經譬西北也手經譬東南也道理之近遠不同勢自不能以飛渡然乘釁召邪阻險割據豈曰無之今病家為足太陽膀胱足陽明胃兩經合病既已難任更加兩經之邪襲入手太陰肺經所以其重莫支手太陰肺者主統一身之氣者也氣通則汗出氣閉則汗壅從前發汗而不得汗馴至肌膚枯澀豈非肺主皮毛肺氣壅閉津液不通漫無潤澤耶任用柴胡葛根河柳辛涼解肌如以水投石有拒無納職此故耳病者為昆邑開府王澄川先生之女孝敬夙成皎然與女曜爭光澄川先生嘗患鼻齄諸女稟之鹹苦肺氣不清鼻間窒塞所以邪易湊入才病外感便當蚤為足經傳手之慮通其肺氣之壅俾得汗出邪去始稱明哲此病為足太陽膀胱足陽明胃兩經合病則足太陽之邪繇背而貫胸足陽明之邪由胸而徹背肺為華蓋覆於胸背之上如錢孝廉素無肺患者病時尚且咳嗽緊逼豈居嘗肺氣不清之體可堪兩經之邪交射乎其用白虎湯為秋令清肅之藥肺金所喜故病勢稍持才加人參五分即轉沉重豈非肺熱反傷之左券乎至於犀角乃手少陰心經之藥夏月心火亢甚間有可用冬月水盛火衰斷非所宜又況手少陰心經與手太陰肺經膜屬相聯以手經而傳手經其事最便所以才一用之隨領注肺之邪直攻心臟正如足太陽誤用葛根即領其邪傳入陽明之例耳不然傷寒之邪過經不解蘊祟日久不過襲入厥陰心胞絡已耳豈有直攻心臟之理哉吾用麻黃髮肺邪杏仁下肺氣石膏清肺熱甘草緩肺急蓋深識仲景制方之妙顓主足經太陽者復可過於手經太陰用之一舉而解手足兩經之危遊刃空虛恢恢有餘寧致手復傳手而蹈凶禍乎乃知肺臟連心正如三輔接壤王畿誤用犀角領邪攻心無異獻門迎賊天之報施聖君賢女抑何慘耶余非乏才無具者而袖手旁觀不禁言之親切有如子規之啼血也已
